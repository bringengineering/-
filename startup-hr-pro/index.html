<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StartupHR Pro - 스타트업 HR/법무 관리 플랫폼</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Styles -->
  <style>
    @keyframes slide-in {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slide-out {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }

    .animate-slide-in {
      animation: slide-in 0.3s ease-out;
    }

    .animate-slide-out {
      animation: slide-out 0.3s ease-out;
    }

    mark {
      background-color: #fef08a;
      padding: 2px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-gray-100">

  <!-- 메인 컨테이너 -->
  <div class="min-h-screen flex">

    <!-- 사이드바 -->
    <aside class="w-64 bg-white shadow-lg fixed h-full">
      <!-- 로고 -->
      <div class="p-6 border-b">
        <h1 class="text-2xl font-bold text-blue-600">StartupHR Pro</h1>
        <p class="text-xs text-gray-600 mt-1">스타트업 HR 관리</p>
      </div>

      <!-- 네비게이션 -->
      <nav class="p-4">
        <ul class="space-y-2">
          <li>
            <button data-page="dashboard"
                    class="w-full text-left px-4 py-3 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition">
              📊 대시보드
            </button>
          </li>
          <li>
            <button data-page="employees"
                    class="w-full text-left px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition">
              👥 직원 관리
            </button>
          </li>
          <li>
            <button data-page="contracts"
                    class="w-full text-left px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition">
              📄 계약서 관리
            </button>
          </li>
          <li>
            <button data-page="attendance"
                    class="w-full text-left px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition">
              ⏰ 근태 관리
            </button>
          </li>
          <li>
            <button data-page="legal"
                    class="w-full text-left px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition">
              ⚖️ 법적 리스크 체크
            </button>
          </li>
          <li>
            <button data-page="conversations"
                    class="w-full text-left px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition">
              💬 대화 분석
            </button>
          </li>
          <li>
            <button data-page="checklist"
                    class="w-full text-left px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition">
              ✅ 일일 체크리스트
            </button>
          </li>
        </ul>

        <!-- 빠른 도구 -->
        <div class="mt-8 pt-8 border-t">
          <h3 class="text-xs font-semibold text-gray-500 uppercase mb-3">빠른 도구</h3>
          <ul class="space-y-2">
            <li>
              <button onclick="App.exportAllData()"
                      class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg transition">
                💾 데이터 백업
              </button>
            </li>
            <li>
              <button onclick="db.clearAll(); location.reload()"
                      class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition">
                🗑️ 데이터 초기화
              </button>
            </li>
          </ul>
        </div>
      </nav>

      <!-- 버전 정보 -->
      <div class="absolute bottom-0 w-full p-4 border-t bg-gray-50">
        <p class="text-xs text-gray-500 text-center">v1.0.0</p>
        <p class="text-xs text-gray-400 text-center mt-1">Made with ❤️</p>
      </div>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="ml-64 flex-1 p-8">
      <!-- 헤더 -->
      <header class="mb-8">
        <div class="flex justify-between items-center">
          <div>
            <h2 class="text-sm text-gray-600" id="current-time"></h2>
          </div>
          <div class="flex items-center space-x-4">
            <button class="p-2 rounded-lg hover:bg-gray-200 transition relative">
              <span class="text-2xl">🔔</span>
              <span class="absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full"></span>
            </button>
            <div class="flex items-center space-x-2">
              <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                대
              </div>
              <div>
                <div class="text-sm font-semibold">대표님</div>
                <div class="text-xs text-gray-500">관리자</div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- 콘텐츠 영역 -->
      <div id="content">
        <!-- 여기에 페이지별 콘텐츠가 렌더링됩니다 -->
        <div class="flex items-center justify-center h-64">
          <div class="text-center">
            <div class="text-4xl mb-4">⏳</div>
            <p class="text-gray-600">로딩 중...</p>
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- JavaScript 모듈 로드 -->
  <script src="js/data-manager.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/employees.js"></script>
  <script src="js/contracts.js"></script>
  <script src="js/attendance.js"></script>
  <script src="js/legal-check.js"></script>
  <script src="js/conversations.js"></script>
  <script src="js/checklist.js"></script>
  <script src="js/app.js"></script>

  <!-- 실시간 시계 -->
  <script>
    function updateTime() {
      const now = new Date();
      const timeStr = now.toLocaleString('ko-KR', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      const timeEl = document.getElementById('current-time');
      if (timeEl) {
        timeEl.textContent = timeStr;
      }
    }

    setInterval(updateTime, 1000);
    updateTime();
  </script>

</body>
</html>
