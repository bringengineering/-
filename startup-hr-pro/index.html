<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="스타트업 대표를 위한 프로페셔널 HR/법무 관리 플랫폼">
  <title>StartupHR Pro - Professional Edition</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- jsPDF CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/custom.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body class="bg-gray-100 animated-bg">

  <!-- Mobile Menu Toggle -->
  <button id="mobileMenuToggle" class="mobile-menu-button no-print">
    <span class="text-2xl">☰</span>
  </button>

  <!-- Dark Mode Toggle (Fixed) -->
  <button id="darkModeToggle" class="fixed bottom-6 right-6 z-50 p-4 rounded-full bg-white shadow-xl hover:shadow-2xl transition-all no-print"
          style="backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.9);">
    <span class="text-2xl">🌙</span>
  </button>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 메인 컨테이너 -->
  <div class="min-h-screen flex">

    <!-- 사이드바 -->
    <aside id="sidebar" class="w-64 fixed h-full glass-card-dark z-40 transition-all">
      <!-- 로고 -->
      <div class="p-6 border-b border-white border-opacity-10">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-600">
          StartupHR Pro
        </h1>
        <p class="text-xs text-gray-300 mt-1">Professional Edition</p>
        <div class="mt-3 px-3 py-1 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full inline-block">
          <span class="text-xs font-bold text-white">v3.0</span>
        </div>
      </div>

      <!-- 네비게이션 -->
      <nav class="p-4">
        <ul class="space-y-2">
          <li>
            <button data-page="dashboard"
                    class="nav-btn w-full text-left px-4 py-3 rounded-lg text-white transition-all flex items-center gap-3"
                    style="background: rgba(59, 130, 246, 0.2);">
              <span class="text-xl">📊</span>
              <span class="font-medium">대시보드</span>
            </button>
          </li>
          <li>
            <button data-page="employees"
                    class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-3">
              <span class="text-xl">👥</span>
              <span class="font-medium">직원 관리</span>
            </button>
          </li>
          <li>
            <button data-page="contracts"
                    class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-3">
              <span class="text-xl">📄</span>
              <span class="font-medium">계약서 관리</span>
            </button>
          </li>
          <li>
            <button data-page="attendance"
                    class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-3">
              <span class="text-xl">⏰</span>
              <span class="font-medium">근태 관리</span>
            </button>
          </li>
          <li>
            <button data-page="legal"
                    class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-3">
              <span class="text-xl">⚖️</span>
              <span class="font-medium">법적 리스크</span>
            </button>
          </li>
          <li>
            <button data-page="conversations"
                    class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-3">
              <span class="text-xl">💬</span>
              <span class="font-medium">대화 분석</span>
            </button>
          </li>
          <li>
            <button data-page="checklist"
                    class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-3">
              <span class="text-xl">✅</span>
              <span class="font-medium">체크리스트</span>
            </button>
          </li>
          <li>
            <button data-page="email-templates"
                    class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-3">
              <span class="text-xl">📧</span>
              <span class="font-medium">이메일 템플릿</span>
            </button>
          </li>
          <li>
            <button data-page="settings"
                    class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-3">
              <span class="text-xl">⚙️</span>
              <span class="font-medium">설정</span>
            </button>
          </li>
        </ul>

        <!-- 빠른 도구 -->
        <div class="mt-8 pt-8 border-t border-white border-opacity-10">
          <h3 class="text-xs font-semibold text-gray-400 uppercase mb-3 px-4">빠른 도구</h3>
          <ul class="space-y-2">
            <li>
              <button onclick="App.exportAllData()"
                      class="w-full text-left px-4 py-2 text-sm text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 rounded-lg transition-all flex items-center gap-2">
                <span>💾</span>
                <span>데이터 백업</span>
              </button>
            </li>
            <li>
              <button onclick="App.importData()"
                      class="w-full text-left px-4 py-2 text-sm text-gray-300 hover:text-white hover:bg-white hover:bg-opacity-10 rounded-lg transition-all flex items-center gap-2">
                <span>📥</span>
                <span>데이터 불러오기</span>
              </button>
            </li>
            <li>
              <button onclick="if(confirm('정말 초기화하시겠습니까?')) { db.clearAll(); location.reload(); }"
                      class="w-full text-left px-4 py-2 text-sm text-red-400 hover:text-red-300 hover:bg-red-500 hover:bg-opacity-10 rounded-lg transition-all flex items-center gap-2">
                <span>🗑️</span>
                <span>데이터 초기화</span>
              </button>
            </li>
          </ul>
        </div>
      </nav>

      <!-- 버전 정보 -->
      <div class="absolute bottom-0 w-full p-4 border-t border-white border-opacity-10">
        <p class="text-xs text-gray-400 text-center">Professional Edition</p>
        <p class="text-xs text-gray-500 text-center mt-1">Made with ❤️ by Claude</p>
      </div>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="ml-64 flex-1 p-8 transition-all">
      <!-- 헤더 -->
      <header class="mb-8 glass-card p-6 animate-fade-in">
        <div class="flex justify-between items-center">
          <div>
            <h2 class="text-sm text-gray-600 flex items-center gap-2" id="current-time">
              <span>⏰</span>
              <span id="time-text"></span>
            </h2>
          </div>
          <div class="flex items-center space-x-4">
            <!-- 알림 센터 -->
            <button id="notification-bell" class="relative p-2 rounded-lg hover:bg-gray-100 transition-all" onclick="NotificationCenter.toggle()">
              <span class="text-2xl">🔔</span>
            </button>
            <!-- 프로필 -->
            <div class="flex items-center space-x-2">
              <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold"
                   style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                대
              </div>
              <div>
                <div class="text-sm font-semibold text-gray-900">대표님</div>
                <div class="text-xs text-gray-500">관리자</div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- 콘텐츠 영역 -->
      <div id="content" class="animate-fade-in">
        <!-- 여기에 페이지별 콘텐츠가 렌더링됩니다 -->
        <div class="flex items-center justify-center h-64">
          <div class="text-center">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-gray-600">로딩 중...</p>
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- JavaScript 모듈 로드 -->
  <script src="js/data-manager.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/employees.js"></script>
  <script src="js/contracts.js"></script>
  <script src="js/attendance.js"></script>
  <script src="js/legal-check.js"></script>
  <script src="js/conversations.js"></script>
  <script src="js/checklist.js"></script>
  <script src="js/dashboard-widgets.js"></script>
  <script src="js/email-templates.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
