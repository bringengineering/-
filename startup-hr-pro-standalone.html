/**
 * StartupHR Pro - Attendance Management Module
 * 근태 관리 시스템 (52시간 체크 포함)
 */

const AttendanceManager = {
  /**
   * 출퇴근 기록 추가
   */
  add(employeeId, date, clockIn, clockOut) {
    // 근무시간 자동 계산
    const workHours = this.calculateWorkHours(clockIn, clockOut);

    // 근무 유형 결정
    const workType = this.getWorkType(date);

    const attendance = db.add('attendance', {
      employee_id: employeeId,
      date,
      clock_in: clockIn,
      clock_out: clockOut,
      work_hours: workHours,
      work_type: workType,
      notes: ''
    });

    // 52시간 체크
    this.check52HoursWarning(employeeId, date);

    Utils.showSuccess('출퇴근 기록이 추가되었습니다.');
    return attendance;
  },

  /**
   * 근무시간 계산
   */
  calculateWorkHours(clockIn, clockOut) {
    if (!clockIn || !clockOut) return 0;

    const start = new Date(`2000-01-01 ${clockIn}`);
    const end = new Date(`2000-01-01 ${clockOut}`);

    let diffMs = end - start;

    // 점심시간 1시간 제외
    if (diffMs > 4 * 60 * 60 * 1000) { // 4시간 이상이면 점심시간 제외
      diffMs -= 60 * 60 * 1000;
    }

    const hours = diffMs / (1000 * 60 * 60);
    return Math.max(0, Math.round(hours * 10) / 10);
  },

  /**
   * 근무 유형 결정
   */
  getWorkType(dateString) {
    const date = new Date(dateString);
    const day = date.getDay();

    // 주말
    if (day === 0 || day === 6) {
      return '주말';
    }

    // 공휴일 체크 (간단 버전)
    const holidays = ['2026-01-01', '2026-03-01', '2026-05-05', '2026-06-06', '2026-08-15', '2026-10-03', '2026-10-09', '2026-12-25'];
    if (holidays.includes(dateString)) {
      return '공휴일';
    }

    return '평일';
  },

  /**
   * 주간 근무시간 조회
   */
  getWeeklyHours(employeeId, weekStartDate) {
    const weekStart = weekStartDate ? new Date(weekStartDate) : Utils.getWeekStart();
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 7);

    const attendance = db.find('attendance', a => {
      const recordDate = new Date(a.date);
      return a.employee_id === employeeId &&
             recordDate >= weekStart &&
             recordDate < weekEnd;
    });

    const totalHours = attendance.reduce((sum, a) => sum + (a.work_hours || 0), 0);

    return {
      weekStart: Utils.formatDate(weekStart),
      weekEnd: Utils.formatDate(weekEnd),
      records: attendance,
      totalHours: Math.round(totalHours * 10) / 10,
      check: Utils.check52Hours(totalHours),
      dailyBreakdown: this.getDailyBreakdown(attendance)
    };
  },

  /**
   * 일일 분석
   */
  getDailyBreakdown(attendance) {
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    const breakdown = [];

    attendance.forEach(record => {
      const day = Utils.getDayOfWeek(record.date);
      breakdown.push({
        date: Utils.formatDate(record.date, 'MM/DD'),
        day,
        hours: record.work_hours,
        clockIn: record.clock_in,
        clockOut: record.clock_out,
        type: record.work_type
      });
    });

    return breakdown.sort((a, b) => a.date.localeCompare(b.date));
  },

  /**
   * 52시간 경고 체크
   */
  check52HoursWarning(employeeId, date) {
    const weekStart = Utils.getWeekStart(new Date(date));
    const weekly = this.getWeeklyHours(employeeId, weekStart);

    const employee = db.getById('employees', employeeId);
    if (!employee) return;

    if (weekly.check.status === 'danger') {
      // 52시간 초과
      Utils.showError(
        `🚨 ${employee.name}님 주 52시간 초과! (${weekly.totalHours}시간)\n즉시 조치가 필요합니다.`
      );

      // 경고 기록 추가
      db.add('warnings', {
        employee_id: employeeId,
        warning_type: '52시간 초과',
        description: `주 ${weekly.totalHours}시간 근무`,
        severity: 5,
        issued_date: new Date().toISOString(),
        resolved: false
      });

    } else if (weekly.check.status === 'critical') {
      // 52시간 임박
      Utils.showError(
        `⚠️ ${employee.name}님 52시간 임박! (${weekly.totalHours}시간)\n연장근로 중단을 권장합니다.`
      );

    } else if (weekly.check.status === 'warning') {
      // 40시간 초과
      console.log(`ℹ️ ${employee.name}님 연장근로 중 (${weekly.totalHours}시간)`);
    }
  },

  /**
   * 월간 통계
   */
  getMonthlyStats(employeeId, year, month) {
    const startDate = new Date(year, month - 1, 1);
    const endDate = new Date(year, month, 0);

    const attendance = db.find('attendance', a => {
      const recordDate = new Date(a.date);
      return a.employee_id === employeeId &&
             recordDate >= startDate &&
             recordDate <= endDate;
    });

    const totalDays = attendance.length;
    const totalHours = attendance.reduce((sum, a) => sum + (a.work_hours || 0), 0);
    const avgHours = totalDays > 0 ? totalHours / totalDays : 0;

    // 지각 체크
    const lateCount = attendance.filter(a => {
      if (!a.clock_in) return false;
      const clockIn = new Date(`2000-01-01 ${a.clock_in}`);
      const standard = new Date(`2000-01-01 09:00`);
      return clockIn > standard;
    }).length;

    // 주말 근무
    const weekendCount = attendance.filter(a => a.work_type === '주말').length;

    return {
      year,
      month,
      totalDays,
      totalHours: Math.round(totalHours * 10) / 10,
      avgHours: Math.round(avgHours * 10) / 10,
      lateCount,
      weekendCount,
      records: attendance
    };
  },

  /**
   * 전체 직원 주간 근무시간
   */
  getAllWeeklyHours(weekStartDate) {
    const employees = db.find('employees', e => e.status === 'active');
    const weekStart = weekStartDate ? new Date(weekStartDate) : Utils.getWeekStart();

    return employees.map(emp => {
      const weekly = this.getWeeklyHours(emp.id, weekStart);
      return {
        employee: emp,
        ...weekly
      };
    }).sort((a, b) => b.totalHours - a.totalHours);
  },

  /**
   * 52시간 위반자 찾기
   */
  find52HoursViolators(weekStartDate) {
    const all = this.getAllWeeklyHours(weekStartDate);
    return all.filter(data => data.check.status === 'danger' || data.check.status === 'critical');
  },

  /**
   * 엑셀 데이터 생성 (CSV)
   */
  exportToCSV(employeeId, startDate, endDate) {
    const attendance = db.find('attendance', a => {
      const recordDate = new Date(a.date);
      return a.employee_id === employeeId &&
             recordDate >= new Date(startDate) &&
             recordDate <= new Date(endDate);
    });

    const employee = db.getById('employees', employeeId);
    const csv = this.generateCSV(attendance, employee);
    const filename = `근태기록_${employee.name}_${startDate}_${endDate}.csv`;

    Utils.downloadFile(csv, filename, 'text/csv; charset=utf-8');
    Utils.showSuccess('근태 기록이 다운로드되었습니다.');
  },

  /**
   * CSV 생성
   */
  generateCSV(attendance, employee) {
    let csv = '\uFEFF'; // UTF-8 BOM
    csv += `직원명,날짜,요일,출근,퇴근,근무시간,유형,비고\n`;

    attendance.forEach(record => {
      csv += `${employee.name},`;
      csv += `${Utils.formatDate(record.date)},`;
      csv += `${Utils.getDayOfWeek(record.date)},`;
      csv += `${record.clock_in || ''},`;
      csv += `${record.clock_out || ''},`;
      csv += `${record.work_hours || 0},`;
      csv += `${record.work_type},`;
      csv += `${record.notes || ''}\n`;
    });

    return csv;
  },

  /**
   * 지각 체크
   */
  isLate(clockIn) {
    if (!clockIn) return false;
    const time = new Date(`2000-01-01 ${clockIn}`);
    const standard = new Date(`2000-01-01 09:00`);
    return time > standard;
  },

  /**
   * 대시보드 요약
   */
  getDashboardSummary() {
    const weekStart = Utils.getWeekStart();
    const all = this.getAllWeeklyHours(weekStart);
    const violators = this.find52HoursViolators(weekStart);

    // 전체 평균
    const avgHours = all.reduce((sum, data) => sum + data.totalHours, 0) / (all.length || 1);

    return {
      weekStart: Utils.formatDate(weekStart),
      totalEmployees: all.length,
      avgHours: Math.round(avgHours * 10) / 10,
      violators: violators.length,
      violatorDetails: violators,
      allStats: all
    };
  },

  /**
   * 자동 입력 (테스트용)
   */
  addSampleData(employeeId, days = 5) {
    const today = new Date();

    for (let i = 0; i < days; i++) {
      const date = new Date(today);
      date.setDate(date.getDate() - i);

      // 주말 제외
      if (date.getDay() === 0 || date.getDay() === 6) continue;

      const clockIn = '09:00';
      const clockOut = `${18 + Math.floor(Math.random() * 3)}:00`;

      );

};

/**
 * StartupHR Pro - Legal Risk Check Module
 * 법적 리스크 자동 체크 시스템
 */

const LegalCheckManager = {
  /**
   * 전체 법적 리스크 체크
   */
  checkAll() {
    const employees = db.find('employees', e => e.status === 'active');
    const results = [];

    employees.forEach(emp => {
      const check = this.checkEmployee(emp.id);
      results.push({
        employee: emp,
        ...check
      });
    });

    // 리스크 점수로 정렬
    return results.sort((a, b) => b.totalScore - a.totalScore);
  },

  /**
   * 직원별 법적 리스크 체크
   */
  checkEmployee(employeeId) {
    const risks = {
      workHours: this.check52Hours(employeeId),
      minimumWage: this.checkMinimumWage(employeeId),
      contract: this.checkContract(employeeId),
      insurance: this.check4대보험(employeeId),
      communication: this.checkCommunication(employeeId)
    };

    // 총점 계산 (100점 만점)
    const scores = Object.values(risks).map(r => r.score);
    const totalScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);

    // 위험 레벨 결정
    let level = 'safe';
    let color = 'green';

    if (totalScore >= 70) {
      level = 'danger';
      color = 'red';
    } else if (totalScore >= 50) {
      level = 'warning';
      color = 'orange';
    } else if (totalScore >= 30) {
      level = 'caution';
      color = 'yellow';
    }

    return {
      totalScore,
      level,
      color,
      risks
    };
  },

  /**
   * 52시간 체크
   */
  check52Hours(employeeId) {
    const weekly = AttendanceManager.getWeeklyHours(employeeId);
    const check = weekly.check;

    let score = 0;
    let issues = [];

    if (check.status === 'danger') {
      score = 100;
      issues.push(`🔴 주 52시간 초과 (${weekly.totalHours}시간)`);
      issues.push('근로기준법 위반으로 과태료 대상');
      issues.push('즉시 근무시간 조정 필요');
    } else if (check.status === 'critical') {
      score = 70;
      issues.push(`🟠 52시간 임박 (${weekly.totalHours}시간)`);
      issues.push('연장근로 중단 권장');
    } else if (check.status === 'warning') {
      score = 30;
      issues.push(`🟡 연장근로 중 (${weekly.totalHours}시간)`);
      issues.push('연장수당 지급 확인 필요');
    } else {
      issues.push('✅ 정상 범위');
    }

    return {
      category: '근로시간',
      score,
      status: check.status,
      details: {
        weeklyHours: weekly.totalHours,
        overtime: check.overtime,
        violation: check.violation
      },
      issues,
      actions: this.getActions52Hours(check.status)
    };
  },

  /**
   * 52시간 조치사항
   */
  getActions52Hours(status) {
    const actions = {
      danger: [
        '즉시 퇴근 조치',
        '초과분에 대한 연장수당 지급',
        '향후 52시간 준수 서면 경고',
        '노무사 상담 권장'
      ],
      critical: [
        '금주 추가 연장근로 금지',
        '다음 주 근무 계획 조정'
      ],
      warning: [
        '연장수당 정확히 계산',
        '주간 근무시간 모니터링'
      ],
      safe: ['현 상태 유지']
    };

    return actions[status] || [];
  },

  /**
   * 최저임금 체크
   */
  checkMinimumWage(employeeId) {
    const contracts = db.find('contracts', c => c.employee_id === employeeId);
    if (contracts.length === 0) {
      return {
        category: '임금',
        score: 50,
        status: 'warning',
        issues: ['⚠️ 계약서 없음'],
        actions: ['계약서 작성 필요']
      };
    }

    const latestContract = contracts.sort((a, b) =>
      new Date(b.start_date) - new Date(a.start_date)
    )[0];

    const hourlyWage = Utils.calculateHourlyWage(
      latestContract.salary,
      latestContract.weekly_hours
    );

    const check = Utils.checkMinimumWage(hourlyWage);

    let score = 0;
    let issues = [];

    if (!check.isValid) {
      score = 100;
      issues.push(`🔴 최저시급 미달`);
      issues.push(`현재 시급: ${Utils.formatCurrency(hourlyWage)}`);
      issues.push(`최저시급: ${Utils.formatCurrency(check.minimumWage)}`);
      issues.push(`부족분: ${Utils.formatCurrency(Math.abs(check.difference))}`);
    } else {
      issues.push('✅ 최저시급 준수');
      issues.push(`현재 시급: ${Utils.formatCurrency(hourlyWage)}`);
    }

    return {
      category: '임금',
      score,
      status: check.isValid ? 'safe' : 'danger',
      details: {
        hourlyWage,
        minimumWage: check.minimumWage,
        difference: check.difference
      },
      issues,
      actions: check.isValid ? [] : ['즉시 급여 인상 필요', '소급 적용 검토']
    };
  },

  /**
   * 계약서 체크
   */
  checkContract(employeeId) {
    const contracts = db.find('contracts', c => c.employee_id === employeeId);

    if (contracts.length === 0) {
      return {
        category: '계약서',
        score: 80,
        status: 'danger',
        issues: ['🔴 계약서 없음', '법적 분쟁 시 불리함'],
        actions: ['즉시 계약서 작성', '소급 서명 검토']
      };
    }

    const latestContract = contracts[contracts.length - 1];
    let score = 0;
    let issues = [];

    // 필수 조항 체크
    const missingClauses = [];

    if (!latestContract.weekly_hours) missingClauses.push('근로시간');
    if (!latestContract.salary) missingClauses.push('급여');
    if (!latestContract.special_terms?.termination_notice) missingClauses.push('해지조건');

    if (missingClauses.length > 0) {
      score = 40;
      issues.push(`🟡 필수 조항 누락: ${missingClauses.join(', ')}`);
    } else {
      issues.push('✅ 필수 조항 포함');
    }

    // 서명 여부
    if (latestContract.status !== 'signed') {
      score += 30;
      issues.push('🟡 미서명 상태');
    }

    return {
      category: '계약서',
      score,
      status: score >= 50 ? 'warning' : 'safe',
      details: {
        contractCount: contracts.length,
        latestStatus: latestContract.status,
        missingClauses
      },
      issues,
      actions: score > 0 ? ['계약서 보완', '재서명 진행'] : []
    };
  },

  /**
   * 4대보험 체크 (간단 버전)
   */
  check4대보험(employeeId) {
    // 실제로는 외부 API 연동 필요
    // 여기서는 계약서 존재 여부로 간단 체크

    const contracts = db.find('contracts', c => c.employee_id === employeeId);

    if (contracts.length === 0) {
      return {
        category: '4대보험',
        score: 50,
        status: 'warning',
        issues: ['⚠️ 계약서 없어 확인 불가'],
        actions: ['계약 체결 후 4대보험 가입']
      };
    }

    return {
      category: '4대보험',
      score: 0,
      status: 'safe',
      issues: ['ℹ️ 별도 확인 필요'],
      actions: ['정기 점검 권장']
    };
  },

  /**
   * 소통 패턴 체크
   */
  checkCommunication(employeeId) {
    const communications = db.find('communications', c => c.employee_id === employeeId);
    const recentComms = communications.slice(-10); // 최근 10건

    let score = 0;
    let issues = [];

    // 소통 회피 패턴
    const avoidCount = recentComms.filter(c =>
      c.content.includes('소통 회피') ||
      c.content.includes('무응답') ||
      c.content.includes('연락 두절')
    ).length;

    if (avoidCount >= 3) {
      score = 60;
      issues.push('🔴 소통 회피 패턴 감지');
      issues.push(`최근 10회 중 ${avoidCount}회 소통 문제`);
    } else if (avoidCount >= 1) {
      score = 30;
      issues.push('🟡 소통 주의 필요');
    } else {
      issues.push('✅ 정상 소통');
    }

    // 경고 기록
    const warnings = db.find('warnings', w => w.employee_id === employeeId);
    if (warnings.length >= 3) {
      score += 40;
      issues.push(`🟠 경고 ${warnings.length}회`);
    }

    return {
      category: '소통',
      score: Math.min(100, score),
      status: score >= 60 ? 'danger' : (score >= 30 ? 'warning' : 'safe'),
      details: {
        totalComms: communications.length,
        avoidCount,
        warningCount: warnings.length
      },
      issues,
      actions: score >= 60 ? ['조기 정리 검토', '모든 소통 서면화'] :
               score >= 30 ? ['면담 진행', '상황 모니터링'] : []
    };
  },

  /**
   * 종합 리포트 생성
   */
  generateReport(employeeId) {
    const employee = db.getById('employees', employeeId);
    const check = this.checkEmployee(employeeId);

    const report = `
========================================
법적 리스크 체크 리포트
========================================

직원명: ${employee.name}
직책: ${employee.position}
입사일: ${Utils.formatDate(employee.hire_date)}
점검일: ${Utils.formatDate(new Date(), 'YYYY-MM-DD HH:mm')}

----------------------------------------
종합 점수: ${check.totalScore}/100
위험 레벨: ${check.level.toUpperCase()}
----------------------------------------

${Object.values(check.risks).map(risk => `
[${risk.category}] ${risk.score}점
상태: ${risk.status}

문제점:
${risk.issues.map(issue => `  - ${issue}`).join('\n')}

조치사항:
${risk.actions.length > 0 ? risk.actions.map(action => `  - ${action}`).join('\n') : '  - 조치 불필요'}
`).join('\n')}

========================================
`.trim();

    return report;
  },

  /**
   * 리포트 다운로드
   */
  downloadReport(employeeId) {
    const report = this.generateReport(employeeId);
    const employee = db.getById('employees', employeeId);
    const filename = `법적리스크체크_${employee.name}_${Utils.formatDate(new Date())}.txt`;

    Utils.downloadFile(report, filename, 'text/plain; charset=utf-8');
    Utils.showSuccess('리포트가 다운로드되었습니다.');
  },

  /**
   * 대시보드 요약
   */
  getDashboardSummary() {
    const results = this.checkAll();

    const dangerCount = results.filter(r => r.level === 'danger').length;
    const warningCount = results.filter(r => r.level === 'warning' || r.level === 'caution').length;
    const avgScore = Math.round(
      results.reduce((sum, r) => sum + r.totalScore, 0) / (results.length || 1)
    );

    return {
      avgScore,
      dangerCount,
      warningCount,
      safeCount: results.length - dangerCount - warningCount,
      topRisks: results.slice(0, 5),
      allResults: results
    };
  }
};

  toggleItem(checklistId, itemId) {
    const checklist = db.getById('daily_checklists', checklistId);
    if (!checklist) return null;

    const itemIndex = checklist.items.findIndex(item => item.id === itemId);
    if (itemIndex === -1) return null;

    checklist.items[itemIndex].done = !checklist.items[itemIndex].done;

    // 완료율 계산
    const doneCount = checklist.items.filter(item => item.done).length;
    checklist.completion_rate = Math.round((doneCount / checklist.items.length) * 100);

    db.update('daily_checklists', checklistId, {
      items: checklist.items,
      completion_rate: checklist.completion_rate
    });

    return checklist;

/**
 * StartupHR Pro - Conversation Analysis Module
 * 대화 분석 및 녹취록 관리
 */

const ConversationManager = {
  /**
   * 대화 기록 추가
   */
  add(employeeId, transcript) {
    const analysis = this.analyze(transcript);

    const conversation = db.add('conversations', {
      employee_id: employeeId,
      date: new Date().toISOString(),
      duration: analysis.estimatedMinutes,
      transcript_text: transcript,
      risk_score: analysis.riskScore,
      critical_count: analysis.criticalKeywords.length,
      warning_count: analysis.warningKeywords.length,
      summary: analysis.summary,
      keywords_detected: analysis.allKeywords
    });

    // 하이라이트 저장
    analysis.highlights.forEach(highlight => {
      db.add('conversation_highlights', {
        conversation_id: conversation.id,
        text_snippet: highlight.text,
        risk_level: highlight.level,
        keyword: highlight.keyword,
        recommendation: highlight.recommendation
      });
    });

    if (analysis.riskScore >= 70) {
      Utils.showError('🚨 고위험 대화 패턴 감지! 즉시 조치가 필요합니다.');
    }

    Utils.showSuccess('대화가 분석되었습니다.');
    return conversation;
  },

  /**
   * 대화 내용 분석
   */
  analyze(text) {
    // 감정적 표현 감지
    const emotional = Utils.detectEmotionalWords(text);

    // 법적 리스크 키워드 감지
    const legal = Utils.detectLegalRisks(text);

    // 모든 키워드
    const allKeywords = [
      ...emotional.critical,
      ...emotional.warning,
      ...emotional.inappropriate,
      ...legal.critical,
      ...legal.warning,
      ...legal.important
    ];

    // 리스크 점수 계산
    const emotionalScore = emotional.critical.length * 20 +
                          emotional.warning.length * 10 +
                          emotional.inappropriate.length * 25;

    const riskScore = Math.min(100, emotionalScore + legal.riskScore);

    // 하이라이트 생성
    const highlights = [];

    emotional.critical.forEach(keyword => {
      highlights.push({
        text: this.extractContext(text, keyword),
        level: 'critical',
        keyword,
        recommendation: '감정적 표현 대신 객관적 사실로 전환 필요'
      });
    });

    legal.critical.forEach(keyword => {
      highlights.push({
        text: this.extractContext(text, keyword),
        level: 'critical',
        keyword,
        recommendation: '법적 리스크 - 즉시 정정 및 서면 정리 필요'
      });
    });

    // 대화 길이 추정 (300자 = 1분 가정)
    const estimatedMinutes = Math.ceil(text.length / 300);

    // 요약 생성
    const summary = this.generateSummary(text, allKeywords, riskScore);

    return {
      estimatedMinutes,
      riskScore,
      criticalKeywords: [...emotional.critical, ...legal.critical],
      warningKeywords: [...emotional.warning, ...legal.warning],
      allKeywords,
      highlights,
      summary,
      emotional,
      legal
    };
  },

  /**
   * 키워드 문맥 추출
   */
  extractContext(text, keyword, contextLength = 50) {
    const index = text.indexOf(keyword);
    if (index === -1) return keyword;

    const start = Math.max(0, index - contextLength);
    const end = Math.min(text.length, index + keyword.length + contextLength);

    let snippet = text.substring(start, end);

    if (start > 0) snippet = '...' + snippet;
    if (end < text.length) snippet = snippet + '...';

    return snippet;
  },

  /**
   * 요약 생성
   */
  generateSummary(text, keywords, riskScore) {
    return {
      wordCount: text.length,
      keywordCount: keywords.length,
      riskLevel: riskScore >= 70 ? 'critical' :
                 riskScore >= 50 ? 'high' :
                 riskScore >= 30 ? 'medium' : 'low',
      mainIssues: this.extractMainIssues(keywords),
      recommendations: this.getRecommendations(riskScore, keywords)
    };
  },

  /**
   * 주요 이슈 추출
   */
  extractMainIssues(keywords) {
    const issues = [];

    if (keywords.some(k => k.includes('52시간') || k.includes('주말'))) {
      issues.push('근로시간 관련 논의');
    }

    if (keywords.some(k => k.includes('환불') || k.includes('교육비'))) {
      issues.push('교육비 환불 문제');
    }

    if (keywords.some(k => k.includes('퇴사') || k.includes('해고'))) {
      issues.push('퇴사 관련 논의');
    }

    if (keywords.some(k => ['배신', '서운', '이기적'].includes(k))) {
      issues.push('감정적 갈등');
    }

    return issues.length > 0 ? issues : ['일반 대화'];
  },

  /**
   * 권장사항 생성
   */
  getRecommendations(riskScore, keywords) {
    const recommendations = [];

    if (riskScore >= 70) {
      recommendations.push('❌ 즉시 대화 중단');
      recommendations.push('✅ 내용을 서면으로 정리하여 발송');
      recommendations.push('✅ 노무사 긴급 상담');
      recommendations.push('✅ 증거 패키지 준비');
    } else if (riskScore >= 50) {
      recommendations.push('⚠️ 대화 내용 서면화');
      recommendations.push('✅ 감정적 표현 자제');
      recommendations.push('✅ 객관적 사실만 전달');
    } else if (riskScore >= 30) {
      recommendations.push('ℹ️ 대화 기록 보관');
      recommendations.push('✅ 필요시 서면 보충');
    } else {
      recommendations.push('✅ 정상 범위의 대화');
    }

    return recommendations;
  },

  /**
   * 10분 룰 체크
   */
  check10MinuteRule(startTime) {
    const now = new Date();
    const start = new Date(startTime);
    const diffMinutes = (now - start) / (1000 * 60);

    if (diffMinutes >= 10) {
      return {
        exceeded: true,
        minutes: Math.round(diffMinutes),
        warning: '⏱️ 10분이 경과했습니다. 대화를 종료하고 서면으로 정리하시겠습니까?'
      };
    }

    return {
      exceeded: false,
      minutes: Math.round(diffMinutes),
      remaining: 10 - Math.round(diffMinutes)
    };
  },

  /**
   * 직원별 대화 기록 조회
   */
  getByEmployee(employeeId) {
    return db.find('conversations', c => c.employee_id === employeeId)
      .sort((a, b) => new Date(b.date) - new Date(a.date));
  },

  /**
   * 대화 상세
   */
  getDetail(conversationId) {
    const conversation = db.getById('conversations', conversationId);
    if (!conversation) return null;

    const employee = db.getById('employees', conversation.employee_id);
    const highlights = db.find('conversation_highlights', h =>
      h.conversation_id === conversationId
    );

    return {
      ...conversation,
      employee,
      highlights
    };
  },

  /**
   * 증거 패키지 생성
   */
  generateEvidencePackage(employeeId) {
    const employee = db.getById('employees', employeeId);
    const conversations = this.getByEmployee(employeeId);
    const attendance = db.find('attendance', a => a.employee_id === employeeId);
    const contracts = db.find('contracts', c => c.employee_id === employeeId);
    const warnings = db.find('warnings', w => w.employee_id === employeeId);
    const communications = db.find('communications', c => c.employee_id === employeeId);

    const package = `
========================================
법적 증거 패키지
========================================

직원명: ${employee.name}
직책: ${employee.position}
입사일: ${Utils.formatDate(employee.hire_date)}
생성일: ${Utils.formatDate(new Date(), 'YYYY-MM-DD HH:mm')}

========================================
1. 대화 녹취 기록 (${conversations.length}건)
========================================

${conversations.map((conv, idx) => `
[${idx + 1}] ${Utils.formatDate(conv.date, 'YYYY-MM-DD HH:mm')}
길이: ${conv.duration}분
리스크 점수: ${conv.risk_score}/100
주요 이슈: ${conv.summary.mainIssues.join(', ')}

전문:
${conv.transcript_text}

분석 결과:
- 위험 키워드: ${conv.critical_count}개
- 주의 키워드: ${conv.warning_count}개

권장조치:
${conv.summary.recommendations.map(r => `  - ${r}`).join('\n')}

${'='.repeat(40)}
`).join('\n')}

========================================
2. 근태 기록 (${attendance.length}건)
========================================

${attendance.map(a => `${Utils.formatDate(a.date)} | ${a.clock_in} ~ ${a.clock_out} | ${a.work_hours}시간 | ${a.work_type}`).join('\n')}

========================================
3. 계약서 (${contracts.length}건)
========================================

${contracts.map((c, idx) => `[${idx + 1}] ${c.contract_type} | ${Utils.formatDate(c.start_date)} ~ ${c.end_date || '무기한'} | ${Utils.formatCurrency(c.salary)}`).join('\n')}

========================================
4. 경고 기록 (${warnings.length}건)
========================================

${warnings.map(w => `[${Utils.formatDate(w.issued_date)}] ${w.warning_type} - ${w.description}`).join('\n')}

========================================
5. 소통 기록 (${communications.length}건)
========================================

${communications.map(c => `[${Utils.formatDate(c.date)}] ${c.comm_type} - ${c.subject}`).join('\n')}

========================================
종합 의견
========================================

${this.generateFinalOpinion(employee, conversations, attendance, warnings)}

========================================
`.trim();

    return package;
  },

  /**
   * 종합 의견 생성
   */
  generateFinalOpinion(employee, conversations, attendance, warnings) {
    const totalRiskScore = conversations.reduce((sum, c) => sum + c.risk_score, 0) /
                           (conversations.length || 1);

    const weeklyHours = AttendanceManager.getWeeklyHours(employee.id);

    let opinion = `직원 ${employee.name}님에 대한 종합 분석 결과:\n\n`;

    if (totalRiskScore >= 70) {
      opinion += '🔴 고위험 상태\n';
      opinion += '- 대화 내용에서 심각한 법적 리스크 발견\n';
      opinion += '- 조기 정리 또는 노무사 상담 강력 권장\n\n';
    }

    if (weeklyHours.check.status === 'danger') {
      opinion += '🔴 52시간 위반\n';
      opinion += `- 주 ${weeklyHours.totalHours}시간 근무\n`;
      opinion += '- 근로기준법 위반 상태\n\n';
    }

    if (warnings.length >= 3) {
      opinion += `🟠 경고 ${warnings.length}회 누적\n`;
      opinion += '- 개선 의지 확인 필요\n\n';
    }

    opinion += '권장 조치:\n';
    opinion += '1. 모든 향후 소통은 서면으로만 진행\n';
    opinion += '2. 감정적 표현 일체 배제\n';
    opinion += '3. 필요시 노무사 동석 하 면담\n';
    opinion += '4. 법적 절차 대비 증거 자료 지속 수집\n';

    return opinion;
  },

  /**
   * 증거 패키지 다운로드
   */
  downloadEvidencePackage(employeeId) {
    const package = this.generateEvidencePackage(employeeId);
    const employee = db.getById('employees', employeeId);
    const filename = `증거패키지_${employee.name}_${Utils.formatDate(new Date())}.txt`;

    Utils.downloadFile(package, filename, 'text/plain; charset=utf-8');
    Utils.showSuccess('증거 패키지가 다운로드되었습니다.');
  }
};

      id: 'contractExpiry',
      title: '📄 계약 만료 예정',
      size: 'small',
      render: function() {
        const expiringContracts = ContractManager.getExpiringContracts(30);

            ${expiringContracts.length > 0 ? expiringContracts.slice(0, 5).map(contract => {

              return `
                <div class="contract-expiry-item ${daysLeft <= 7 ? 'urgent' : ''}">
                  <div class="employee-name">${contract.employeeName}</div>
                  <div class="days-left ${daysLeft <= 7 ? 'text-red-600' : 'text-yellow-600'}">
                    ${daysLeft}일 남음
                  </div>
                </div>
              `;
            }).join('') : '<div class="empty-state">만료 예정 계약 없음</div>'}
          </div>
        `;
      }
    },

    quickActions: {
      id: 'quickActions',
      title: '⚡ 빠른 작업',
      size: 'small',
      render: function() {
        return `
          <div class="quick-actions-grid">
            <button onclick="App.renderPage('employees')" class="quick-action-btn">
              <span class="action-icon">👥</span>
              <span class="action-label">직원 관리</span>
            </button>
            <button onclick="App.renderPage('contracts')" class="quick-action-btn">
              <span class="action-icon">📄</span>
              <span class="action-label">계약서</span>
            </button>
            <button onclick="App.renderPage('attendance')" class="quick-action-btn">

              <span class="action-label">법적 체크</span>
            </button>
          </div>
        `;
      }

  },

  /**
   * 위젯 레이아웃 로드
   */
  loadLayout() {
    const saved = localStorage.getItem('dashboard-layout');
    if (saved) {
      try {
        return JSON.parse(saved);
      } catch (e) {
        console.error('레이아웃 로드 실패:', e);
      }
    }

    // 기본 레이아웃
    return ['stats', 'weeklyChart', 'riskGauge', 'recentActivity', 'upcomingTasks'];
  },

  /**
   * 위젯 레이아웃 저장
   */
  saveLayout(layout) {
    localStorage.setItem('dashboard-layout', JSON.stringify(layout));
    Utils.showSuccess('대시보드 레이아웃이 저장되었습니다.');
  },

  /**
   * 대시보드 렌더링
   */
  renderDashboard() {
    const layout = this.loadLayout();
    const editMode = localStorage.getItem('dashboard-edit-mode') === 'true';

    let html = `
      <div class="dashboard-header">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">📊 대시보드</h1>
          <p class="text-gray-600 mt-1">${new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}</p>
        </div>
        <div class="flex gap-3">
          <button onclick="DashboardWidgets.toggleEditMode()"
                  class="btn ${editMode ? 'btn-primary' : 'btn-ghost'}">
            ${editMode ? '✅ 편집 완료' : '⚙️ 레이아웃 편집'}
          </button>
          <button onclick="DashboardWidgets.addWidget()"
                  class="btn btn-ghost"
                  ${editMode ? '' : 'style="display:none"'}>
            ➕ 위젯 추가
          </button>
        </div>
      </div>

      <div id="dashboard-widgets" class="dashboard-widgets-grid ${editMode ? 'edit-mode' : ''}">
    `;

    layout.forEach((widgetId, index) => {
      const widget = this.availableWidgets[widgetId];
      if (widget) {
        html += this.renderWidget(widget, index, editMode);
      }
    });

    html += `</div>`;

    return html;
  },

  /**
   * 개별 위젯 렌더링
   */
  renderWidget(widget, index, editMode) {
    return `
      <div class="dashboard-widget widget-${widget.size}"
           data-widget-id="${widget.id}"
           data-index="${index}"
           draggable="${editMode}">
        <div class="widget-header">
          <h3 class="widget-title">${widget.title}</h3>
          <div class="widget-actions">
            ${editMode ? `
              <button onclick="DashboardWidgets.removeWidget('${widget.id}')"
                      class="widget-action-btn" title="삭제">
                ✕
              </button>
              <button class="widget-drag-handle" title="드래그하여 이동">
                ⋮⋮
              </button>
            ` : ''}
          </div>
        </div>
        <div class="widget-content">
          ${widget.render()}
        </div>
      </div>
    `;
  },

  /**
   * 편집 모드 토글
   */
  toggleEditMode() {
    const currentMode = localStorage.getItem('dashboard-edit-mode') === 'true';
    localStorage.setItem('dashboard-edit-mode', (!currentMode).toString());
    App.renderPage('dashboard');

    if (!currentMode) {
      Utils.showInfo('위젯을 드래그하여 위치를 변경하거나 ✕를 눌러 삭제할 수 있습니다.');
      this.enableDragAndDrop();
    }
  },

  /**
   * 드래그앤드롭 활성화
   */
  enableDragAndDrop() {
    const container = document.getElementById('dashboard-widgets');
    if (!container) return;

    let draggedElement = null;

    container.addEventListener('dragstart', (e) => {
      if (e.target.classList.contains('dashboard-widget')) {
        draggedElement = e.target;
        e.target.style.opacity = '0.5';
      }
    });

    container.addEventListener('dragend', (e) => {
      if (e.target.classList.contains('dashboard-widget')) {
        e.target.style.opacity = '1';
      }
    });

    container.addEventListener('dragover', (e) => {
      e.preventDefault();
      const afterElement = this.getDragAfterElement(container, e.clientY);
      if (afterElement == null) {
        container.appendChild(draggedElement);
      } else {
        container.insertBefore(draggedElement, afterElement);
      }
    });

    container.addEventListener('drop', (e) => {
      e.preventDefault();
      this.saveCurrentLayout();
    });
  },

  /**
   * 드래그 위치 계산
   */
  getDragAfterElement(container, y) {
    const draggableElements = [...container.querySelectorAll('.dashboard-widget:not(.dragging)')];

    return draggableElements.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;

      if (offset < 0 && offset > closest.offset) {
        return { offset: offset, element: child };
      } else {
        return closest;
      }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  },

  /**
   * 현재 레이아웃 저장
   */
  saveCurrentLayout() {
    const widgets = document.querySelectorAll('.dashboard-widget');
    const layout = Array.from(widgets).map(w => w.dataset.widgetId);
    this.saveLayout(layout);
  },

  /**
   * 위젯 추가
   */
  addWidget() {
    const currentLayout = this.loadLayout();
    const availableToAdd = Object.keys(this.availableWidgets).filter(id => !currentLayout.includes(id));

    if (availableToAdd.length === 0) {
      Utils.showInfo('모든 위젯이 이미 추가되었습니다.');
      return;
    }

    const html = `
      <div class="widget-selector-modal">
        <h3 class="text-xl font-bold mb-4">위젯 추가</h3>
        <div class="widget-selector-grid">
          ${availableToAdd.map(id => {
            const widget = this.availableWidgets[id];
            return `
              <div class="widget-selector-item" onclick="DashboardWidgets.confirmAddWidget('${id}')">
                <div class="text-2xl mb-2">${widget.title.split(' ')[0]}</div>
                <div class="font-medium">${widget.title}</div>
                <div class="text-xs text-gray-500 mt-1">${widget.size}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;

    App.showModal('위젯 추가', html);
  },

  /**
   * 위젯 추가 확인
   */
  confirmAddWidget(widgetId) {
    const layout = this.loadLayout();
    layout.push(widgetId);
    this.saveLayout(layout);
    App.hideModal();
    App.renderPage('dashboard');
  },

  /**
   * 위젯 제거
   */
  removeWidget(widgetId) {
    if (Utils.confirm('이 위젯을 제거하시겠습니까?')) {
      const layout = this.loadLayout();
      const newLayout = layout.filter(id => id !== widgetId);
      this.saveLayout(newLayout);
      App.renderPage('dashboard');
    }
  },

  /**
   * 위젯 새로고침
   */
  refreshWidget(widgetId) {
    const widget = this.availableWidgets[widgetId];
    if (!widget) return;

    const element = document.querySelector(`[data-widget-id="${widgetId}"] .widget-content`);
    if (element) {
      element.innerHTML = widget.render();
      if (widget.afterRender) {
        setTimeout(() => widget.afterRender(), 100);
      }
    }
  },

  /**
   * 초기화 - 모든 위젯의 afterRender 실행
   */
  initWidgets() {
    setTimeout(() => {
      const layout = this.loadLayout();
      layout.forEach(widgetId => {
        const widget = this.availableWidgets[widgetId];
        if (widget && widget.afterRender) {
          widget.afterRender();
        }
      });

      // 편집 모드라면 드래그앤드롭 활성화
      if (localStorage.getItem('dashboard-edit-mode') === 'true') {
        this.enableDragAndDrop();
      }
    }, 100);
  }
};

  /**
   * 템플릿 렌더링 (변수 치환)
   */
  render(templateId, variables) {
    const template = this.templates[templateId];
    if (!template) {
      console.error(`템플릿을 찾을 수 없습니다: ${templateId}`);
      return null;
    }

    let subject = template.subject;
    let body = template.body;

    // 변수 치환
    Object.keys(variables).forEach(key => {
      const regex = new RegExp(`{${key}}`, 'g');
      subject = subject.replace(regex, variables[key]);
      body = body.replace(regex, variables[key]);
    });

    return {
      subject,
      body
    };
  },

  /**
   * 이메일 미리보기
   */
  preview(templateId, variables) {
    const email = this.render(templateId, variables);
    if (!email) return;

    const html = `
      <div class="email-preview-modal">
        <div class="email-preview-header">
          <h3 class="text-xl font-bold">📧 이메일 미리보기</h3>
          <div class="text-sm text-gray-600 mt-2">
            <strong>제목:</strong> ${email.subject}
          </div>
        </div>
        <div class="email-preview-body">
          ${email.body}
        </div>
        <div class="email-preview-actions">
          <button onclick="EmailTemplates.copyToClipboard('${templateId}', ${JSON.stringify(variables).replace(/"/g, '&quot;')})"
                  class="btn btn-ghost">
            📋 HTML 복사
          </button>
          <button onclick="EmailTemplates.downloadHTML('${templateId}', ${JSON.stringify(variables).replace(/"/g, '&quot;')})"
                  class="btn btn-primary">
            💾 HTML 다운로드
          </button>
        </div>
      </div>
    `;

    App.showModal('이메일 미리보기', html);
  },

  /**
   * HTML 클립보드 복사
   */
  copyToClipboard(templateId, variables) {
    const email = this.render(templateId, variables);
    if (!email) return;

    const fullHTML = `
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>${email.subject}</title>
</head>
<body>
  ${email.body}
</body>
</html>
    `;

    navigator.clipboard.writeText(fullHTML).then(() => {
      Utils.showSuccess('HTML이 클립보드에 복사되었습니다!');
    }).catch(err => {
      Utils.showError('복사 실패: ' + err);
    });
  },

  /**
   * HTML 파일 다운로드
   */
  downloadHTML(templateId, variables) {
    const email = this.render(templateId, variables);
    if (!email) return;

    const fullHTML = `
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>${email.subject}</title>
</head>
<body>
  ${email.body}
</body>
</html>
    `;

    const blob = new Blob([fullHTML], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `email-${templateId}-${Date.now()}.html`;
    a.click();
    URL.revokeObjectURL(url);

    Utils.showSuccess('이메일 HTML 파일이 다운로드되었습니다!');
  },

  /**
   * 자동 이메일 스케줄링
   */
  scheduleAutomatedEmails() {
    // 계약 만료 알림 (7일 전)
    const contracts = db.getAll('contracts');
    const today = new Date();

    contracts.forEach(contract => {
      const endDate = new Date(contract.endDate);
      const daysLeft = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));

      if (daysLeft === 7 || daysLeft === 3 || daysLeft === 1) {
        const employee = db.get('employees', contract.employeeId);
        if (employee) {
          this.queueEmail('contractExpiry', {
            companyName: SettingsManager.load().company.name,
            companyEmail: SettingsManager.load().company.email || 'hr@company.com',
            companyPhone: SettingsManager.load().company.phone,
            employeeName: employee.name,
            daysLeft: daysLeft,
            endDate: Utils.formatDate(endDate)
          });
        }
      }
    });

    // 주 52시간 초과 알림
    const weeklyStats = EmployeeManager.getDashboardSummary().weeklyStats;
    weeklyStats.forEach(stat => {
      if (stat.hours > 52) {
        this.queueEmail('weeklyOvertime', {
          companyName: SettingsManager.load().company.name,
          companyEmail: SettingsManager.load().company.email || 'hr@company.com',
          companyPhone: SettingsManager.load().company.phone,
          employeeName: stat.employee.name,
          weeklyHours: stat.hours,
          overtimeHours: stat.hours - 52
        });
      }
    });
  },

      type: 'info'

/**
 * StartupHR Pro - Main Application
 * SPA 라우팅 및 UI 렌더링
 */

const App = {
  currentPage: 'dashboard',
  charts: {}, // Chart.js 인스턴스 저장

  init() {
    console.log('🚀 StartupHR Pro 시작');

    // UI 초기화
    this.initClock();
    this.initDarkMode();
    this.initMobileMenu();

    // 이벤트 리스너 등록
    this.setupEventListeners();

    // 초기 페이지 렌더링
    this.renderPage('dashboard');

    // 샘플 데이터 추가 (테스트용)
    this.addSampleAttendance();

    // 모달 외부 클릭 시 닫기 설정
    this.setupModalCloseOnOutsideClick();
  },

  initClock() {
    function updateTime() {
      const now = new Date();
      const timeStr = now.toLocaleString('ko-KR', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      const timeEl = document.getElementById('time-text');
      if (timeEl) {
        timeEl.textContent = timeStr;
      }
    }
    setInterval(updateTime, 1000);
    updateTime();
  },

  initDarkMode() {
    const darkModeToggle = document.getElementById('darkModeToggle');
    const html = document.documentElement;

    // 저장된 테마 불러오기
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    this.updateDarkModeIcon();

    darkModeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      this.updateDarkModeIcon();
    });
  },

  updateDarkModeIcon() {
    const darkModeToggle = document.getElementById('darkModeToggle');
    const html = document.documentElement;
    const theme = html.getAttribute('data-theme');
    darkModeToggle.innerHTML = theme === 'dark'
      ? '<span class="text-2xl">☀️</span>'
      : '<span class="text-2xl">🌙</span>';
  },

  initMobileMenu() {
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const sidebar = document.getElementById('sidebar');

    mobileMenuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('active');
      const icon = mobileMenuToggle.querySelector('span');
      icon.textContent = sidebar.classList.contains('active') ? '✕' : '☰';
    });

    // 사이드바 외부 클릭 시 닫기 (모바일)
    document.addEventListener('click', (e) => {
      if (window.innerWidth <= 768 &&
          !sidebar.contains(e.target) &&
          !mobileMenuToggle.contains(e.target) &&
          sidebar.classList.contains('active')) {
        sidebar.classList.remove('active');
        mobileMenuToggle.querySelector('span').textContent = '☰';
      }
    });

    // 메뉴 클릭 시 사이드바 닫기 (모바일)
    document.querySelectorAll('[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
          sidebar.classList.remove('active');
          mobileMenuToggle.querySelector('span').textContent = '☰';
        }
      });
    });
  },

  setupEventListeners() {
    // 네비게이션
    document.querySelectorAll('[data-page]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const page = e.target.closest('[data-page]').dataset.page;
        this.renderPage(page);
      });
    });
  },

  setupModalCloseOnOutsideClick() {
    document.addEventListener('click', (e) => {
      const modal = document.querySelector('.modal-overlay');
      if (modal && e.target === modal) {
        this.hideModal();
      }
    });
  },

  renderPage(page) {
    this.currentPage = page;

    // 네비게이션 활성화
    document.querySelectorAll('[data-page]').forEach(btn => {
      if (btn.dataset.page === page) {
        btn.classList.add('bg-blue-600', 'text-white');
        btn.classList.remove('text-gray-700', 'hover:bg-gray-100');
      } else {
        btn.classList.remove('bg-blue-600', 'text-white');
        btn.classList.add('text-gray-700', 'hover:bg-gray-100');
      }
    });

    // 콘텐츠 렌더링
    const content = document.getElementById('content');

    switch (page) {
      case 'dashboard':
        content.innerHTML = DashboardWidgets.renderDashboard();
        DashboardWidgets.initWidgets();
        break;
      case 'employees':
        content.innerHTML = this.renderEmployees();
        break;
      case 'contracts':
        content.innerHTML = this.renderContracts();
        break;
      case 'attendance':
        content.innerHTML = this.renderAttendance();
        break;
      case 'legal':
        content.innerHTML = this.renderLegalCheck();
        break;
      case 'conversations':
        content.innerHTML = this.renderConversations();
        break;
      case 'checklist':
        content.innerHTML = this.renderChecklist();
        break;
      case 'settings':
        content.innerHTML = SettingsManager.renderSettingsPage();
        break;
      case 'email-templates':
        content.innerHTML = EmailTemplates.renderTemplatesPage();
        break;
      default:
        content.innerHTML = DashboardWidgets.renderDashboard();
        DashboardWidgets.initWidgets();
    }

    // 페이지별 이벤트 리스너
    this.setupPageEvents(page);
  },

  // 직원 필터링
  filterEmployees() {
    const searchTerm = document.getElementById('employeeSearch')?.value.toLowerCase() || '';
    const filter = document.getElementById('employeeFilter')?.value || 'all';
    const rows = document.querySelectorAll('.employee-row');

    rows.forEach(row => {
      const name = row.dataset.name;
      const position = row.dataset.position;
      const status = row.dataset.status;
      const isRisky = row.dataset.risky === 'true';

      let matchesSearch = name.includes(searchTerm) || position.includes(searchTerm);
      let matchesFilter = true;

      if (filter === 'active') matchesFilter = status === 'active';
      else if (filter === 'inactive') matchesFilter = status === 'inactive';
      else if (filter === 'risky') matchesFilter = isRisky;

      row.style.display = (matchesSearch && matchesFilter) ? '' : 'none';
    });
  },

  // CSV 내보내기
  exportEmployeesCSV() {
    const employees = EmployeeManager.getAll();
    let csv = 'ID,이름,직책,이메일,전화번호,입사일,근무형태,연봉,상태\n';

    employees.forEach(emp => {
      csv += `${emp.id},"${emp.name}","${emp.position}","${emp.email || ''}","${emp.phone || ''}","${emp.hire_date}","${emp.employment_type}","${emp.salary || ''}","${emp.status}"\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `직원목록_${Utils.formatDate(new Date())}.csv`;
    link.click();

    Utils.showSuccess('CSV 파일이 다운로드되었습니다.');
  },

  saveAttendance() {
    const form = document.getElementById('attendanceForm');
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const formData = new FormData(form);
    const clockIn = formData.get('clock_in');
    const clockOut = formData.get('clock_out');

    // 근무시간 계산 (점심시간 1시간 제외)
    const [inHour, inMin] = clockIn.split(':').map(Number);
    const [outHour, outMin] = clockOut.split(':').map(Number);
    const hours = (outHour * 60 + outMin - inHour * 60 - inMin) / 60 - 1; // 점심시간 1시간 제외

    if (hours <= 0) {
      Utils.showError('퇴근 시간이 출근 시간보다 빠릅니다.');
      return;
    }

    const data = {
      employee_id: formData.get('employee_id'),
      date: formData.get('date'),
      clock_in: clockIn,
      clock_out: clockOut,
      hours: Math.round(hours * 10) / 10,
      note: formData.get('note') || ''
    };

    AttendanceManager.create(data);
    Utils.showSuccess('근태 기록이 추가되었습니다.');

    this.hideModal();
    this.renderPage('attendance');
  },

  renderLegalCharts(summary) {
    if (this.charts.legalRisk) this.charts.legalRisk.destroy();
    if (this.charts.categoryScore) this.charts.categoryScore.destroy();

    // 리스크 분포 차트

    if (riskCtx) {
      this.charts.legalRisk = new Chart(riskCtx, {
        type: 'doughnut',
        data: {
          labels: ['안전', '주의', '위험'],
          datasets: [{
            data: [summary.safeCount, summary.warningCount, summary.dangerCount],
            backgroundColor: [
              'rgba(34, 197, 94, 0.8)',
              'rgba(234, 179, 8, 0.8)',
              'rgba(220, 38, 38, 0.8)'
            ],
            borderColor: [
              'rgb(34, 197, 94)',
              'rgb(234, 179, 8)',
              'rgb(220, 38, 38)'
            ],
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                padding: 15,
                font: { size: 12 }
              }
            },
            tooltip: {
              callbacks: {
                label: (context) => {
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const value = context.parsed;
                  const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                  return `${context.label}: ${value}명 (${percentage}%)`;
                }
              }
            }
          }
        }
      });
    }

    // 카테고리별 평균 점수 차트
    const categoryCtx = document.getElementById('categoryScoreChart');
    if (categoryCtx) {
      const categories = ['근로계약', '근로시간', '임금', '휴게휴가', '기타'];
      const avgScores = categories.map(cat => {
        const scores = summary.allResults.map(r => {
          const risk = Object.values(r.risks).find(risk => risk.category === cat);
          return risk ? risk.score : 0;
        });
        return scores.length > 0 ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
      });

      this.charts.categoryScore = new Chart(categoryCtx, {
        type: 'radar',
        data: {
          labels: categories,
          datasets: [{
            label: '평균 리스크 점수',
            data: avgScores,
            backgroundColor: 'rgba(59, 130, 246, 0.2)',
            borderColor: 'rgb(59, 130, 246)',
            borderWidth: 2,
            pointBackgroundColor: 'rgb(59, 130, 246)',
            pointBorderColor: '#fff',
            pointHoverBackgroundColor: '#fff',
            pointHoverBorderColor: 'rgb(59, 130, 246)'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              ticks: {
                stepSize: 20
              }
            }
          },
          plugins: {
            legend: {
              display: false
            }
          }
        }
      });
    }
  },

        risk.issues.forEach(issue => {
          report += `     • ${issue}\n`;
        });
      });
    });

    const blob = new Blob([report], { type: 'text/plain;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `법적리스크보고서_${Utils.formatDate(new Date())}.txt`;
    link.click();

    Utils.showSuccess('보고서가 다운로드되었습니다.');
  },

  saveChecklistItem() {
    const form = document.getElementById('checklistItemForm');
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const formData = new FormData(form);
    const today = Utils.formatDate(new Date());
    const checklist = ChecklistManager.getChecklist(today);

    const newItem = {
      id: checklist.items.length + 1,
      task: formData.get('task'),
      priority: formData.get('priority'),
      done: false
    };

    checklist.items.push(newItem);
    db.update('checklists', checklist.id, checklist);

    Utils.showSuccess('체크리스트 항목이 추가되었습니다.');
    this.hideModal();
    this.renderPage('checklist');
  },

          // 모든 탭 비활성화
          document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.settings-tab-content').forEach(c => c.style.display = 'none');

        });

    // 실제로는 DB에 저장해야 하지만, 여기서는 알림만 표시

  },

  downloadConversationReport(employeeId) {
    const text = document.getElementById('conversationInput').value;
    const analysis = ConversationManager.analyze(text);

    let report = `대화 분석 보고서\n`;
    report += `작성일: ${Utils.formatDate(new Date())}\n\n`;

    if (employeeId) {
      const employee = EmployeeManager.get(employeeId);
      if (employee) {
        report += `직원: ${employee.name} (${employee.position})\n\n`;
      }
    }

    report += `=== 분석 결과 ===\n`;
    report += `리스크 점수: ${analysis.riskScore}/100\n`;
    report += `위험도: ${analysis.riskScore >= 70 ? '높음' : analysis.riskScore >= 50 ? '중간' : '낮음'}\n\n`;

    report += `위험 키워드 (${analysis.criticalKeywords.length}개):\n`;
    analysis.criticalKeywords.forEach(k => report += `  - ${k}\n`);
    report += `\n`;

    report += `주의 키워드 (${analysis.warningKeywords.length}개):\n`;
    analysis.warningKeywords.forEach(k => report += `  - ${k}\n`);
    report += `\n`;

    report += `주요 이슈:\n`;
    analysis.summary.mainIssues.forEach(i => report += `  - ${i}\n`);
    report += `\n`;

    report += `권장 조치:\n`;
    analysis.summary.recommendations.forEach((r, idx) => report += `  ${idx + 1}. ${r}\n`);
    report += `\n`;

    report += `=== 원본 대화 ===\n`;
    report += text;

    const blob = new Blob([report], { type: 'text/plain;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `대화분석_${Utils.formatDate(new Date())}.txt`;
    link.click();

    Utils.showSuccess('보고서가 다운로드되었습니다.');
  },

  // ===== 차트 렌더링 =====
  renderDashboardCharts(summary, legal) {
    // 기존 차트 제거
    if (this.charts.weeklyHours) this.charts.weeklyHours.destroy();
    if (this.charts.riskDistribution) this.charts.riskDistribution.destroy();

    // 주간 근무시간 차트
    const weeklyCtx = document.getElementById('weeklyHoursChart');
    if (weeklyCtx) {
      this.charts.weeklyHours = new Chart(weeklyCtx, {
        type: 'bar',
        data: {
          labels: summary.weeklyStats.map(s => s.employee.name),
          datasets: [{
            label: '주간 근무시간',
            data: summary.weeklyStats.map(s => s.hours),
            backgroundColor: summary.weeklyStats.map(s => {
              if (s.check.status === 'danger') return 'rgba(220, 38, 38, 0.8)';
              if (s.check.status === 'critical') return 'rgba(249, 115, 22, 0.8)';
              if (s.check.status === 'warning') return 'rgba(234, 179, 8, 0.8)';
              return 'rgba(34, 197, 94, 0.8)';
            }),
            borderColor: summary.weeklyStats.map(s => {
              if (s.check.status === 'danger') return 'rgb(220, 38, 38)';
              if (s.check.status === 'critical') return 'rgb(249, 115, 22)';
              if (s.check.status === 'warning') return 'rgb(234, 179, 8)';
              return 'rgb(34, 197, 94)';
            }),
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (context) => {
                  const stat = summary.weeklyStats[context.dataIndex];
                  return [
                    `근무시간: ${stat.hours}시간`,
                    `상태: ${stat.check.message}`
                  ];
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 60,
              ticks: {
                callback: (value) => value + 'h'
              },
              grid: {
                color: 'rgba(0, 0, 0, 0.05)'
              }
            },
            x: {
              grid: {
                display: false
              }
            }
          },
          plugins: {
            annotation: {
              annotations: {
                line1: {
                  type: 'line',
                  yMin: 52,
                  yMax: 52,
                  borderColor: 'rgb(220, 38, 38)',
                  borderWidth: 2,
                  borderDash: [5, 5],
                  label: {
                    content: '법정 한계 (52시간)',
                    enabled: true,
                    position: 'end'
                  }
                }
              }
            }
          }
        }
      });
    }

    // 법적 리스크 분포 차트
    const riskCtx = document.getElementById('riskDistributionChart');
    if (riskCtx) {
      const riskLevels = { safe: 0, warning: 0, danger: 0 };
      legal.allResults.forEach(result => {
        if (result.totalScore < 50) riskLevels.safe++;
        else if (result.totalScore < 70) riskLevels.warning++;
        else riskLevels.danger++;
      });

      this.charts.riskDistribution = new Chart(riskCtx, {
        type: 'doughnut',
        data: {
          labels: ['안전', '주의', '위험'],
          datasets: [{
            data: [riskLevels.safe, riskLevels.warning, riskLevels.danger],
            backgroundColor: [
              'rgba(34, 197, 94, 0.8)',
              'rgba(234, 179, 8, 0.8)',
              'rgba(220, 38, 38, 0.8)'
            ],
            borderColor: [
              'rgb(34, 197, 94)',
              'rgb(234, 179, 8)',
              'rgb(220, 38, 38)'
            ],
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                padding: 15,
                font: { size: 12 }
              }
            },
            tooltip: {
              callbacks: {
                label: (context) => {
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const value = context.parsed;
                  const percentage = ((value / total) * 100).toFixed(1);
                  return `${context.label}: ${value}명 (${percentage}%)`;
                }
              }
            }
          }
        }
      });
    }
  },

  // ===== 모달 시스템 =====
  showModal(title, content, options = {}) {
    const modalHTML = `
      <div class="modal-overlay fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 animate-fade-in">
        <div class="modal-content bg-white rounded-lg shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden animate-slide-up">
          <div class="modal-header bg-gradient-to-r from-blue-600 to-purple-600 text-white p-6 flex justify-between items-center">
            <h2 class="text-2xl font-bold">${title}</h2>
            <button onclick="App.hideModal()" class="text-white hover:text-gray-200 text-3xl leading-none">
              &times;
            </button>
          </div>
          <div class="modal-body p-6 overflow-y-auto" style="max-height: calc(90vh - 180px);">
            ${content}
          </div>
          ${options.footer ? `
            <div class="modal-footer border-t p-4 flex justify-end gap-2">
              ${options.footer}
            </div>
          ` : ''}
        </div>
      </div>
    `;

    const container = document.getElementById('modal-container');
    container.innerHTML = modalHTML;

    // ESC 키로 닫기
    const escHandler = (e) => {
      if (e.key === 'Escape') {
        this.hideModal();
        document.removeEventListener('keydown', escHandler);
      }
    };
    document.addEventListener('keydown', escHandler);
  },

  hideModal() {
    const container = document.getElementById('modal-container');
    const modal = container.querySelector('.modal-overlay');

    if (modal) {
      modal.style.animation = 'fadeOut 0.2s ease-out';
      setTimeout(() => {
        container.innerHTML = '';
      }, 200);
    }
  },

      return;

    const formData = new FormData(form);
    const data = {
      name: formData.get('name'),
      position: formData.get('position'),
      email: formData.get('email') || '',
      phone: formData.get('phone') || '',
      hire_date: formData.get('hire_date'),
      employment_type: formData.get('employment_type'),
      salary: parseInt(formData.get('salary')) || 0,
      status: formData.get('status')
    };

    if (employeeId) {
      // 수정
      EmployeeManager.update(employeeId, data);
      Utils.showSuccess(`${data.name}님의 정보가 수정되었습니다.`);
    } else {
      // 추가
      EmployeeManager.create(data);
      Utils.showSuccess(`${data.name}님이 추가되었습니다.`);
    }

    this.hideModal();
    this.renderPage('employees');
  },

                  ${alert.message}
                </h5>
                <p class="text-sm text-gray-700 mt-1">${alert.action}</p>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    const footer = `
      <button type="button" onclick="App.hideModal()"
              class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
        확인
      </button>
    `;

    this.showModal(`알림 (${allAlerts.length}개)`, content, { footer });
  },

  // ===== 데이터 Import 기능 =====
  importData() {
    const content = `
      <div class="space-y-4">
        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
          <p class="text-sm text-yellow-800">
            <strong>주의:</strong> 데이터를 불러오면 기존 데이터가 덮어씌워집니다.
            계속하기 전에 현재 데이터를 백업하는 것을 권장합니다.
          </p>
        </div>

        <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center">
          <input type="file" id="importFileInput" accept=".json" class="hidden">
          <button onclick="document.getElementById('importFileInput').click()"
                  class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
            JSON 파일 선택
          </button>
          <p class="text-sm text-gray-600 mt-3">
            .json 파일을 선택하세요
          </p>
        </div>

        <div id="importPreview" class="hidden">
          <h4 class="font-bold mb-2">미리보기</h4>
          <div id="importStats" class="bg-gray-50 rounded-lg p-4 text-sm"></div>
        </div>
      </div>
    `;

    const footer = `
      <button type="button" onclick="App.hideModal()"
              class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        취소
      </button>
      <button type="button" id="confirmImportBtn" onclick="App.confirmImport()" disabled
              class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        불러오기
      </button>
    `;

    this.showModal('데이터 불러오기', content, { footer });

    // 파일 선택 이벤트
    setTimeout(() => {
      const fileInput = document.getElementById('importFileInput');
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const data = JSON.parse(event.target.result);
              this.previewImportData(data);
            } catch (error) {
              Utils.showError('유효하지 않은 JSON 파일입니다.');
            }
          };
          reader.readAsText(file);
        }
      });
    }, 100);
  },

  previewImportData(data) {
    const preview = document.getElementById('importPreview');
    const stats = document.getElementById('importStats');
    const confirmBtn = document.getElementById('confirmImportBtn');

    let statsHTML = '<div class="space-y-2">';
    let totalItems = 0;

    for (const [table, items] of Object.entries(data)) {
      if (Array.isArray(items)) {
        statsHTML += `<div class="flex justify-between"><span>${table}:</span><span class="font-bold">${items.length}개</span></div>`;
        totalItems += items.length;
      }
    }
    statsHTML += `<div class="border-t pt-2 mt-2 flex justify-between"><span class="font-bold">총계:</span><span class="font-bold text-blue-600">${totalItems}개</span></div>`;
    statsHTML += '</div>';

    stats.innerHTML = statsHTML;
    preview.classList.remove('hidden');
    confirmBtn.disabled = false;

    // 데이터 임시 저장
    this._importData = data;
  },

  confirmImport() {
    if (!this._importData) {
      Utils.showError('불러올 데이터가 없습니다.');
      return;
    }

    if (!confirm('정말 데이터를 불러오시겠습니까? 기존 데이터는 덮어씌워집니다.')) {
      return;
    }

    try {
      db.importAll(this._importData);
      Utils.showSuccess('데이터를 성공적으로 불러왔습니다!');
      this.hideModal();

      // 페이지 새로고침하여 새 데이터 반영
      setTimeout(() => {
        location.reload();
      }, 1000);
    } catch (error) {
      Utils.showError('데이터 불러오기 실패: ' + error.message);
    }
  }
};

// DOM 로드 완료 시 앱 초기화
document.addEventListener('DOMContentLoaded', () => {
  App.init();
});
  </script>

</body>
</html>
