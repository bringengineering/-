<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="스타트업 대표를 위한 프로페셔널 HR/법무 관리 플랫폼">
  <title>StartupHR Pro - Professional Edition (Standalone)</title>

  <!-- External CDN Libraries (Required) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">

  <!-- Inline CSS -->
  <style>
/**
 * StartupHR Pro - Professional Design System
 * Modern Glassmorphism UI with Smooth Animations
 */

/* ===== CSS Variables ===== */
:root {
  /* Primary Colors */
  --primary-50: #eff6ff;
  --primary-100: #dbeafe;
  --primary-200: #bfdbfe;
  --primary-300: #93c5fd;
  --primary-400: #60a5fa;
  --primary-500: #3b82f6;
  --primary-600: #2563eb;
  --primary-700: #1d4ed8;
  --primary-800: #1e40af;
  --primary-900: #1e3a8a;

  /* Success Colors */
  --success-500: #10b981;
  --success-600: #059669;

  /* Warning Colors */
  --warning-500: #f59e0b;
  --warning-600: #d97706;

  /* Danger Colors */
  --danger-500: #ef4444;
  --danger-600: #dc2626;

  /* Gray Colors */
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;

  /* Gradients */
  --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --gradient-success: linear-gradient(135deg, #10b981 0%, #059669 100%);
  --gradient-warning: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
  --gradient-danger: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  --gradient-ocean: linear-gradient(135deg, #667eea 0%, #3b82f6 100%);
  --gradient-sunset: linear-gradient(135deg, #fa709a 0%, #fee140 100%);

  /* Shadows */
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
  --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);

  /* Glassmorphism */
  --glass-bg: rgba(255, 255, 255, 0.7);
  --glass-border: rgba(255, 255, 255, 0.18);

  /* Transitions */
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slower: 500ms cubic-bezier(0.4, 0, 0.2, 1);

  /* Z-Index */
  --z-dropdown: 1000;
  --z-sticky: 1020;
  --z-fixed: 1030;
  --z-modal-backdrop: 1040;
  --z-modal: 1050;
  --z-popover: 1060;
  --z-tooltip: 1070;
}

/* Dark Mode Variables */
[data-theme="dark"] {
  --glass-bg: rgba(31, 41, 55, 0.7);
  --glass-border: rgba(255, 255, 255, 0.1);
}

/* ===== Global Styles ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  background-attachment: fixed;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Main Container - Fixed scroll issue */
main {
  min-height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 4rem;
}

#content {
  max-width: 1600px;
  margin: 0 auto;
  overflow: visible;
}

/* ===== Glassmorphism Cards ===== */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  box-shadow: var(--shadow-xl);
  transition: all var(--transition-base);
}

.glass-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-2xl);
}

.glass-card-dark {
  background: rgba(31, 41, 55, 0.8);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

/* ===== Animated Background ===== */
.animated-bg {
  position: relative;
  overflow: hidden;
}

.animated-bg::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(45deg,
    rgba(102, 126, 234, 0.1) 0%,
    rgba(118, 75, 162, 0.1) 100%);
  animation: gradient-shift 15s ease infinite;
}

@keyframes gradient-shift {
  0%, 100% {
    transform: translateX(0) translateY(0);
  }
  25% {
    transform: translateX(5%) translateY(5%);
  }
  50% {
    transform: translateX(-5%) translateY(-5%);
  }
  75% {
    transform: translateX(5%) translateY(-5%);
  }
}

/* ===== Smooth Animations ===== */
@keyframes fade-in {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fade-in-scale {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes slide-in-right {
  from {
    opacity: 0;
    transform: translateX(50px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes slide-in-left {
  from {
    opacity: 0;
    transform: translateX(-50px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes slide-up {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeOut {
  from {
    opacity: 1;
  }
  to {
    opacity: 0;
  }
}

@keyframes pulse-glow {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
  }
  50% {
    box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
  }
}

@keyframes shimmer {
  0% {
    background-position: -1000px 0;
  }
  100% {
    background-position: 1000px 0;
  }
}

.animate-fade-in {
  animation: fade-in 0.5s ease-out;
}

.animate-fade-in-scale {
  animation: fade-in-scale 0.3s ease-out;
}

.animate-slide-in-right {
  animation: slide-in-right 0.5s ease-out;
}

.animate-slide-in-left {
  animation: slide-in-left 0.5s ease-out;
}

.animate-slide-up {
  animation: slide-up 0.5s ease-out;
}

.animate-pulse-glow {
  animation: pulse-glow 2s infinite;
}

/* Stagger Animation */
.stagger-item {
  opacity: 0;
  animation: fade-in 0.5s ease-out forwards;
}

.stagger-item:nth-child(1) { animation-delay: 0.1s; }
.stagger-item:nth-child(2) { animation-delay: 0.2s; }
.stagger-item:nth-child(3) { animation-delay: 0.3s; }
.stagger-item:nth-child(4) { animation-delay: 0.4s; }
.stagger-item:nth-child(5) { animation-delay: 0.5s; }
.stagger-item:nth-child(6) { animation-delay: 0.6s; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.75rem 1.5rem;
  font-size: 0.875rem;
  font-weight: 600;
  line-height: 1.25rem;
  border-radius: 0.75rem;
  transition: all var(--transition-base);
  cursor: pointer;
  border: none;
  outline: none;
  text-decoration: none;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.3), transparent 70%);
  transform: translateX(-100%);
  transition: transform var(--transition-slow);
}

.btn:hover::before {
  transform: translateX(100%);
}

.btn:active {
  transform: scale(0.98);
}

.btn-primary {
  background: var(--gradient-primary);
  color: white;
  box-shadow: var(--shadow-md);
}

.btn-primary:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

.btn-success {
  background: var(--gradient-success);
  color: white;
  box-shadow: var(--shadow-md);
}

.btn-warning {
  background: var(--gradient-warning);
  color: white;
  box-shadow: var(--shadow-md);
}

.btn-danger {
  background: var(--gradient-danger);
  color: white;
  box-shadow: var(--shadow-md);
}

.btn-ghost {
  background: transparent;
  border: 2px solid var(--gray-300);
  color: var(--gray-700);
}

.btn-ghost:hover {
  background: var(--gray-50);
  border-color: var(--primary-500);
  color: var(--primary-700);
}

/* ===== Progress Bar ===== */
.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--gray-200);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}

.progress-bar-fill {
  height: 100%;
  background: var(--gradient-primary);
  border-radius: 999px;
  transition: width var(--transition-slow);
  position: relative;
  overflow: hidden;
}

.progress-bar-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.4),
    transparent
  );
  animation: shimmer 2s infinite;
}

/* ===== Badges ===== */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 0.25rem 0.75rem;
  font-size: 0.75rem;
  font-weight: 600;
  border-radius: 999px;
  line-height: 1;
}

.badge-success {
  background: var(--success-500);
  color: white;
}

.badge-warning {
  background: var(--warning-500);
  color: white;
}

.badge-danger {
  background: var(--danger-500);
  color: white;
}

.badge-primary {
  background: var(--primary-500);
  color: white;
}

.badge-gray {
  background: var(--gray-200);
  color: var(--gray-700);
}

/* ===== Tooltip ===== */
.tooltip {
  position: relative;
  cursor: help;
}

.tooltip::before {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  padding: 0.5rem 0.75rem;
  background: var(--gray-900);
  color: white;
  font-size: 0.75rem;
  border-radius: 0.5rem;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-base);
  z-index: var(--z-tooltip);
}

.tooltip:hover::before {
  opacity: 1;
}

/* ===== Modal ===== */
.modal-backdrop {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(5px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: var(--z-modal-backdrop);
  animation: fade-in 0.2s ease-out;
}

.modal {
  background: white;
  border-radius: 20px;
  box-shadow: var(--shadow-2xl);
  max-width: 90vw;
  max-height: 90vh;
  overflow-y: auto;
  animation: fade-in-scale 0.3s ease-out;
}

.modal-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-body {
  padding: 1.5rem;
}

.modal-footer {
  padding: 1.5rem;
  border-top: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0.75rem;
}

/* ===== Loading Spinner ===== */
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid var(--gray-200);
  border-top-color: var(--primary-500);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.spinner-sm {
  width: 20px;
  height: 20px;
  border-width: 2px;
}

/* ===== Alert ===== */
.alert {
  padding: 1rem 1.5rem;
  border-radius: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
  animation: slide-up 0.3s ease-out;
}

.alert-success {
  background: rgba(16, 185, 129, 0.1);
  border: 1px solid rgba(16, 185, 129, 0.3);
  color: var(--success-600);
}

.alert-warning {
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid rgba(245, 158, 11, 0.3);
  color: var(--warning-600);
}

.alert-danger {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: var(--danger-600);
}

.alert-info {
  background: rgba(59, 130, 246, 0.1);
  border: 1px solid rgba(59, 130, 246, 0.3);
  color: var(--primary-600);
}

/* ===== Notification Toast ===== */
.toast-container {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: var(--z-tooltip);
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  max-width: 400px;
}

.toast {
  background: white;
  border-radius: 0.75rem;
  box-shadow: var(--shadow-xl);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  animation: slide-in-right 0.3s ease-out;
  border-left: 4px solid var(--primary-500);
}

.toast-success {
  border-left-color: var(--success-500);
}

.toast-error {
  border-left-color: var(--danger-500);
}

.toast-warning {
  border-left-color: var(--warning-500);
}

/* ===== Chart Container ===== */
.chart-container {
  position: relative;
  height: 300px;
  width: 100%;
}

/* ===== Stat Card ===== */
.stat-card {
  background: white;
  border-radius: 1rem;
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  transition: all var(--transition-base);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--gradient-primary);
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-xl);
}

.stat-card-success::before {
  background: var(--gradient-success);
}

.stat-card-warning::before {
  background: var(--gradient-warning);
}

.stat-card-danger::before {
  background: var(--gradient-danger);
}

/* ===== Mobile Menu Toggle ===== */
.mobile-menu-button {
  display: none;
  position: fixed;
  top: 1rem;
  left: 1rem;
  z-index: 60;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  padding: 0.75rem;
  border-radius: 0.75rem;
  box-shadow: var(--shadow-lg);
  cursor: pointer;
  transition: all var(--transition-base);
}

.mobile-menu-button:hover {
  transform: scale(1.05);
  box-shadow: var(--shadow-xl);
}

/* ===== Responsive ===== */
@media (max-width: 1024px) {
  /* 태블릿 */
  #sidebar {
    width: 240px;
  }

  main {
    margin-left: 240px;
  }
}

@media (max-width: 768px) {
  /* 모바일 */
  body {
    padding-top: 60px;
  }

  .mobile-menu-button {
    display: block;
  }

  #sidebar {
    transform: translateX(-100%);
    transition: transform var(--transition-base);
  }

  #sidebar.active {
    transform: translateX(0);
  }

  main {
    margin-left: 0;
    padding: 1rem;
  }

  .glass-card {
    border-radius: 15px;
    padding: 1rem !important;
  }

  .btn {
    padding: 0.625rem 1.25rem;
    font-size: 0.8125rem;
  }

  .modal {
    max-width: 95vw;
    margin: 1rem;
  }

  .modal-body {
    padding: 1rem;
  }

  .toast-container {
    left: 1rem;
    right: 1rem;
    max-width: none;
    top: 5rem;
  }

  /* 통계 카드 */
  .stat-card {
    padding: 1rem;
  }

  /* 차트 */
  .chart-container {
    height: 250px;
  }

  /* 테이블 스크롤 */
  table {
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }

  /* 헤더 */
  header .flex {
    flex-direction: column;
    gap: 1rem;
  }

  /* 다크모드 토글 */
  #darkModeToggle {
    bottom: 4rem;
    right: 1rem;
    padding: 0.75rem;
  }

  /* 그리드 */
  .grid {
    grid-template-columns: 1fr !important;
  }

  /* 네비게이션 */
  .nav-btn {
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
  }

  /* 폼 */
  input,
  select,
  textarea {
    font-size: 16px; /* iOS zoom 방지 */
  }
}

@media (max-width: 480px) {
  /* 작은 모바일 */
  main {
    padding: 0.75rem;
  }

  .glass-card {
    padding: 0.75rem !important;
  }

  h1 {
    font-size: 1.5rem !important;
  }

  h2 {
    font-size: 1.25rem !important;
  }

  h3 {
    font-size: 1.125rem !important;
  }

  .btn {
    width: 100%;
    justify-content: center;
  }

  .chart-container {
    height: 200px;
  }

  /* 사이드바 너비 */
  #sidebar {
    width: 80vw;
    max-width: 280px;
  }
}

/* 모바일 가로 모드 */
@media (max-height: 600px) and (orientation: landscape) {
  #sidebar {
    overflow-y: auto;
  }

  main {
    padding: 1rem;
  }
}

/* ===== Print Styles ===== */
@media print {
  body {
    background: white;
  }

  .glass-card {
    background: white;
    border: 1px solid var(--gray-300);
  }

  .no-print {
    display: none !important;
  }

  .btn,
  button {
    display: none;
  }

  .modal-backdrop {
    display: none;
  }
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-track {
  background: var(--gray-100);
}

::-webkit-scrollbar-thumb {
  background: var(--gray-400);
  border-radius: 5px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--gray-500);
}

/* ===== Dark Mode ===== */
[data-theme="dark"] {
  color-scheme: dark;
}

[data-theme="dark"] body {
  background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
}

[data-theme="dark"] .stat-card,
[data-theme="dark"] .modal {
  background: var(--gray-800);
  color: var(--gray-100);
}

[data-theme="dark"] .modal-header,
[data-theme="dark"] .modal-footer {
  border-color: var(--gray-700);
}

[data-theme="dark"] input,
[data-theme="dark"] select,
[data-theme="dark"] textarea {
  background: var(--gray-700);
  border-color: var(--gray-600);
  color: var(--gray-100);
}

[data-theme="dark"] .toast {
  background: var(--gray-800);
  color: var(--gray-100);
}

/* ===== PROFESSIONAL HR PLATFORM STYLES ===== */

/* Profile Photo Styles */
.profile-photo {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid white;
  box-shadow: var(--shadow-md);
  transition: all var(--transition-base);
}

.profile-photo:hover {
  transform: scale(1.1);
  box-shadow: var(--shadow-xl);
}

.profile-photo-lg {
  width: 120px;
  height: 120px;
}

.profile-photo-sm {
  width: 40px;
  height: 40px;
  border-width: 2px;
}

.profile-photo-placeholder {
  background: var(--gradient-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 1.5rem;
}

.profile-photo-upload {
  position: relative;
  display: inline-block;
  cursor: pointer;
}

.profile-photo-upload input[type="file"] {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

.profile-photo-upload:hover .profile-photo {
  opacity: 0.8;
}

.profile-photo-upload::after {
  content: '📷';
  position: absolute;
  bottom: 0;
  right: 0;
  background: white;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-md);
  font-size: 0.875rem;
}

/* Employee Card Styles */
.employee-card {
  background: white;
  border-radius: 1rem;
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  transition: all var(--transition-base);
  border: 1px solid var(--gray-200);
  position: relative;
  overflow: hidden;
}

.employee-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--gradient-primary);
  opacity: 0;
  transition: opacity var(--transition-base);
}

.employee-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-xl);
  border-color: var(--primary-300);
}

.employee-card:hover::before {
  opacity: 1;
}

.employee-card-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
}

.employee-card-body {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.employee-card-footer {
  display: flex;
  gap: 0.5rem;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--gray-200);
}

/* Grid and List View Toggle */
.view-toggle {
  display: flex;
  gap: 0.5rem;
  background: white;
  padding: 0.25rem;
  border-radius: 0.5rem;
  box-shadow: var(--shadow-sm);
}

.view-toggle-btn {
  padding: 0.5rem 1rem;
  border: none;
  background: transparent;
  border-radius: 0.375rem;
  cursor: pointer;
  transition: all var(--transition-base);
  color: var(--gray-600);
  font-weight: 500;
}

.view-toggle-btn.active {
  background: var(--primary-500);
  color: white;
  box-shadow: var(--shadow-sm);
}

.view-toggle-btn:hover:not(.active) {
  background: var(--gray-100);
}

/* Grid View */
.employees-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
}

/* List View */
.employees-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.employee-list-item {
  background: white;
  border-radius: 0.75rem;
  padding: 1rem 1.5rem;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition-base);
  display: flex;
  align-items: center;
  gap: 1.5rem;
  border: 1px solid var(--gray-200);
}

.employee-list-item:hover {
  box-shadow: var(--shadow-md);
  transform: translateX(4px);
  border-color: var(--primary-300);
}

/* Advanced Search Panel */
.search-panel {
  background: white;
  border-radius: 1rem;
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  margin-bottom: 1.5rem;
}

.search-filters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-top: 1rem;
}

.search-input {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 2px solid var(--gray-300);
  border-radius: 0.75rem;
  font-size: 1rem;
  transition: all var(--transition-base);
  background: white;
}

.search-input:focus {
  outline: none;
  border-color: var(--primary-500);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.search-input::placeholder {
  color: var(--gray-400);
}

/* Filter Pills */
.filter-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 1rem;
}

.filter-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: var(--primary-50);
  color: var(--primary-700);
  border-radius: 999px;
  font-size: 0.875rem;
  font-weight: 500;
  border: 1px solid var(--primary-200);
}

.filter-pill-remove {
  cursor: pointer;
  font-weight: bold;
  padding: 0 0.25rem;
  border-radius: 50%;
  transition: all var(--transition-fast);
}

.filter-pill-remove:hover {
  background: var(--primary-200);
}

/* Settings Page Styles */
.settings-container {
  max-width: 1200px;
  margin: 0 auto;
}

.settings-tabs {
  display: flex;
  gap: 0.5rem;
  border-bottom: 2px solid var(--gray-200);
  margin-bottom: 2rem;
  overflow-x: auto;
}

.settings-tab {
  padding: 1rem 1.5rem;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  font-weight: 500;
  color: var(--gray-600);
  transition: all var(--transition-base);
  white-space: nowrap;
}

.settings-tab.active {
  color: var(--primary-600);
  border-bottom-color: var(--primary-600);
}

.settings-tab:hover:not(.active) {
  color: var(--gray-900);
  background: var(--gray-50);
}

.settings-section {
  background: white;
  border-radius: 1rem;
  padding: 2rem;
  box-shadow: var(--shadow-md);
  margin-bottom: 1.5rem;
}

.settings-section-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--gray-200);
}

.settings-section-title {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--gray-900);
}

.settings-section-description {
  color: var(--gray-600);
  font-size: 0.875rem;
}

.settings-form-group {
  margin-bottom: 1.5rem;
}

.settings-form-label {
  display: block;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: 0.5rem;
  font-size: 0.875rem;
}

.settings-form-input {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 2px solid var(--gray-300);
  border-radius: 0.75rem;
  font-size: 1rem;
  transition: all var(--transition-base);
}

.settings-form-input:focus {
  outline: none;
  border-color: var(--primary-500);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

/* Color Picker */
.color-picker-group {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.color-picker {
  width: 60px;
  height: 60px;
  border: 3px solid white;
  border-radius: 0.75rem;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  transition: all var(--transition-base);
}

.color-picker:hover {
  transform: scale(1.1);
  box-shadow: var(--shadow-lg);
}

.color-preview {
  width: 100%;
  height: 100%;
  border-radius: 0.5rem;
}

/* Logo Upload */
.logo-upload-area {
  width: 100%;
  max-width: 300px;
  aspect-ratio: 16/9;
  border: 3px dashed var(--gray-300);
  border-radius: 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--transition-base);
  background: var(--gray-50);
  position: relative;
  overflow: hidden;
}

.logo-upload-area:hover {
  border-color: var(--primary-500);
  background: var(--primary-50);
}

.logo-upload-area.has-image {
  border-style: solid;
  border-color: var(--primary-300);
  background: white;
}

.logo-preview {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.logo-upload-text {
  text-align: center;
  color: var(--gray-600);
  font-size: 0.875rem;
}

/* Toggle Switch */
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 26px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: var(--gray-300);
  transition: var(--transition-base);
  border-radius: 34px;
}

.toggle-slider:before {
  position: absolute;
  content: "";
  height: 20px;
  width: 20px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: var(--transition-base);
  border-radius: 50%;
  box-shadow: var(--shadow-sm);
}

input:checked + .toggle-slider {
  background-color: var(--primary-500);
}

input:checked + .toggle-slider:before {
  transform: translateX(24px);
}

/* Notification Center */
.notification-center {
  position: fixed;
  top: 70px;
  right: 1rem;
  width: 400px;
  max-height: 600px;
  background: white;
  border-radius: 1rem;
  box-shadow: var(--shadow-2xl);
  z-index: var(--z-modal);
  overflow: hidden;
  display: none;
  animation: slide-in-right 0.3s ease-out;
}

.notification-center.active {
  display: flex;
  flex-direction: column;
}

.notification-center-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--gradient-primary);
  color: white;
}

.notification-center-body {
  flex: 1;
  overflow-y: auto;
  max-height: 500px;
}

.notification-item {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--gray-100);
  transition: all var(--transition-base);
  cursor: pointer;
  position: relative;
}

.notification-item:hover {
  background: var(--gray-50);
}

.notification-item.unread {
  background: var(--primary-50);
}

.notification-item.unread::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--primary-500);
}

.notification-item-title {
  font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 0.25rem;
}

.notification-item-description {
  font-size: 0.875rem;
  color: var(--gray-600);
  margin-bottom: 0.25rem;
}

.notification-item-time {
  font-size: 0.75rem;
  color: var(--gray-500);
}

.notification-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: var(--danger-500);
  color: white;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.25rem 0.5rem;
  border-radius: 999px;
  min-width: 20px;
  text-align: center;
  box-shadow: var(--shadow-md);
}

/* Dashboard Widgets */
.widget-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.widget {
  background: white;
  border-radius: 1rem;
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  transition: all var(--transition-base);
}

.widget:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.widget-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.widget-title {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--gray-600);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.widget-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 0.5rem;
}

.widget-change {
  font-size: 0.875rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 0.25rem;
}

.widget-change.positive {
  color: var(--success-600);
}

.widget-change.negative {
  color: var(--danger-600);
}

/* Animated Counter */
@keyframes count-up {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.counter {
  animation: count-up 0.5s ease-out;
}

/* Timeline */
.timeline {
  position: relative;
  padding-left: 2rem;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--gray-200);
}

.timeline-item {
  position: relative;
  padding-bottom: 2rem;
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -2.5rem;
  top: 0;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--primary-500);
  border: 3px solid white;
  box-shadow: var(--shadow-md);
}

.timeline-item-content {
  background: white;
  padding: 1rem;
  border-radius: 0.75rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-200);
}

.timeline-item-time {
  font-size: 0.75rem;
  color: var(--gray-500);
  margin-bottom: 0.25rem;
}

.timeline-item-title {
  font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 0.25rem;
}

.timeline-item-description {
  font-size: 0.875rem;
  color: var(--gray-600);
}

/* Risk Gauge */
.risk-gauge {
  position: relative;
  width: 200px;
  height: 100px;
  margin: 0 auto;
}

.risk-gauge-arc {
  width: 100%;
  height: 100%;
}

.risk-gauge-value {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2rem;
  font-weight: 700;
  color: var(--gray-900);
}

/* Action Checklist */
.action-checklist {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.action-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem;
  background: white;
  border-radius: 0.75rem;
  border: 1px solid var(--gray-200);
  transition: all var(--transition-base);
}

.action-item:hover {
  border-color: var(--primary-300);
  box-shadow: var(--shadow-sm);
}

.action-checkbox {
  width: 20px;
  height: 20px;
  border-radius: 0.25rem;
  border: 2px solid var(--gray-300);
  cursor: pointer;
  transition: all var(--transition-base);
}

.action-checkbox:checked {
  background: var(--success-500);
  border-color: var(--success-500);
}

.action-item-text {
  flex: 1;
  color: var(--gray-700);
}

.action-item-text.completed {
  text-decoration: line-through;
  color: var(--gray-400);
}

/* Import/Export Area */
.import-export-area {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-top: 2rem;
}

.import-box,
.export-box {
  background: var(--gray-50);
  border: 2px dashed var(--gray-300);
  border-radius: 1rem;
  padding: 2rem;
  text-align: center;
  transition: all var(--transition-base);
  cursor: pointer;
}

.import-box:hover,
.export-box:hover {
  border-color: var(--primary-500);
  background: var(--primary-50);
}

.import-icon,
.export-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
}

/* Sparkline Chart */
.sparkline {
  width: 100%;
  height: 40px;
}

/* Quick Action Buttons */
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-top: 1.5rem;
}

.quick-action-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  background: white;
  border: 2px solid var(--gray-200);
  border-radius: 0.75rem;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  transition: all var(--transition-base);
  box-shadow: var(--shadow-sm);
}

.quick-action-btn:hover {
  border-color: var(--primary-500);
  color: var(--primary-700);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

/* Bulk Actions Bar */
.bulk-actions-bar {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gray-900);
  color: white;
  padding: 1rem 2rem;
  border-radius: 999px;
  box-shadow: var(--shadow-2xl);
  display: flex;
  align-items: center;
  gap: 1rem;
  animation: slide-up 0.3s ease-out;
  z-index: var(--z-fixed);
}

.bulk-actions-count {
  font-weight: 600;
  padding-right: 1rem;
  border-right: 1px solid var(--gray-700);
}

.bulk-action-btn {
  padding: 0.5rem 1rem;
  background: white;
  color: var(--gray-900);
  border: none;
  border-radius: 0.5rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-base);
}

.bulk-action-btn:hover {
  transform: scale(1.05);
}

/* Calendar View */
.calendar-view {
  background: white;
  border-radius: 1rem;
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
}

.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0.5rem;
}

.calendar-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0.5rem;
  border-radius: 0.5rem;
  font-size: 0.875rem;
  cursor: pointer;
  transition: all var(--transition-base);
  border: 1px solid var(--gray-200);
}

.calendar-day:hover {
  background: var(--gray-50);
  border-color: var(--primary-300);
}

.calendar-day.today {
  background: var(--primary-500);
  color: white;
  font-weight: 600;
}

.calendar-day.has-event {
  position: relative;
}

.calendar-day.has-event::after {
  content: '';
  position: absolute;
  bottom: 4px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary-500);
}

/* Responsive Updates */
@media (max-width: 768px) {
  .employees-grid {
    grid-template-columns: 1fr;
  }

  .notification-center {
    width: calc(100vw - 2rem);
    right: 1rem;
  }

  .import-export-area {
    grid-template-columns: 1fr;
  }

  .settings-tabs {
    font-size: 0.875rem;
  }

  .settings-tab {
    padding: 0.75rem 1rem;
  }

  .bulk-actions-bar {
    left: 1rem;
    right: 1rem;
    transform: none;
    border-radius: 1rem;
  }

  .calendar-grid {
    gap: 0.25rem;
  }

  .calendar-day {
    font-size: 0.75rem;
    padding: 0.25rem;
  }
}

/* ===== Dashboard Widgets System ===== */
.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
}

.dashboard-widgets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
  margin-top: 2rem;
}

.dashboard-widget {
  background: white;
  border-radius: 1rem;
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  transition: all var(--transition-base);
  position: relative;
  overflow: hidden;
}

.dashboard-widget:hover {
  box-shadow: var(--shadow-xl);
  transform: translateY(-2px);
}

.widget-large {
  grid-column: span 2;
}

.widget-medium {
  grid-column: span 1;
}

.widget-small {
  grid-column: span 1;
}

.widget-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 2px solid var(--gray-100);
}

.widget-title {
  font-size: 1.125rem;
  font-weight: 700;
  color: var(--gray-900);
}

.widget-actions {
  display: flex;
  gap: 0.5rem;
}

.widget-action-btn {
  padding: 0.25rem 0.5rem;
  background: var(--gray-100);
  border: none;
  border-radius: 0.5rem;
  cursor: pointer;
  transition: all var(--transition-fast);
  color: var(--gray-600);
  font-size: 0.875rem;
}

.widget-action-btn:hover {
  background: var(--gray-200);
  color: var(--gray-900);
}

.widget-drag-handle {
  padding: 0.25rem 0.5rem;
  background: var(--gray-100);
  border: none;
  border-radius: 0.5rem;
  cursor: grab;
  transition: all var(--transition-fast);
  color: var(--gray-600);
  font-weight: bold;
}

.widget-drag-handle:active {
  cursor: grabbing;
}

.dashboard-widget[draggable="true"] {
  cursor: move;
  opacity: 0.9;
}

.dashboard-widgets-grid.edit-mode .dashboard-widget {
  border: 2px dashed var(--primary-300);
}

.widget-content {
  min-height: 100px;
}

/* Widget-specific styles */
.stat-card {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  padding: 1.5rem;
  border-radius: 0.75rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--glass-border);
}

.stat-value {
  font-size: 2rem;
  font-weight: 800;
  color: var(--gray-900);
  margin-bottom: 0.5rem;
}

.stat-label {
  font-size: 0.875rem;
  color: var(--gray-600);
  margin-bottom: 0.5rem;
}

.stat-icon {
  font-size: 2rem;
  opacity: 0.2;
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
}

.chart-container {
  position: relative;
  height: 250px;
  width: 100%;
}

.widget-chart {
  max-height: 250px !important;
}

/* Risk Gauge */
.risk-gauge-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 0;
}

.risk-gauge {
  width: 200px;
  height: 120px;
}

.risk-gauge-fill {
  transition: stroke-dasharray 1s ease-out;
}

.risk-gauge-value {
  font-size: 2rem;

.widget-selector-item {
  padding: 1.5rem;

  padding: 2rem;

/* Enhanced Glass Card with Premium Feel */

  overflow: hidden;
}

.premium-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);

  border-color: #667eea;

.premium-card:active {

/**

 * LocalStorage 기반 데이터 관리 시스템

class DataManager {
  constructor() {
    this.storagePrefix = 'startuphr_';
    this.initializeStorage();
  }

  /**
   * 초기 데이터 구조 설정
   */
  initializeStorage() {
    const tables = [
      'employees',
      'contracts',
      'attendance',
      'education_support',
      'warnings',
      'communications',
      'conversations',
      'legal_checks',
      'daily_checklists',
      'case_studies',
      'settings'
    ];

    tables.forEach(table => {
      if (!this.getAll(table)) {
        this.setTable(table, []);
      }
    });

    // 샘플 데이터 초기화 (첫 실행 시)
    if (this.getAll('employees').length === 0) {
      this.loadSampleData();
    }
  }

  /**
   * 테이블 키 생성
   */
  getKey(table) {
    return `${this.storagePrefix}${table}`;
  }

  /**
   * 전체 데이터 조회
   */
  getAll(table) {
    const data = localStorage.getItem(this.getKey(table));
    return data ? JSON.parse(data) : null;
  }

  /**
   * 테이블 설정
   */
  setTable(table, data) {
    localStorage.setItem(this.getKey(table), JSON.stringify(data));
  }

  /**
   * ID로 단일 항목 조회
   */
  getById(table, id) {
    const data = this.getAll(table);
    return data.find(item => item.id === id);
  }

  /**
   * 조건으로 검색
   */
  find(table, predicate) {
    const data = this.getAll(table);
    return data.filter(predicate);
  }

  /**
   * 항목 추가
   */
  add(table, item) {
    const data = this.getAll(table);
    const newItem = {
      ...item,
      id: this.generateId(),
      created_at: new Date().toISOString()
    };
    data.push(newItem);
    this.setTable(table, data);
    return newItem;
  }

  /**
   * 항목 업데이트
   */
  update(table, id, updates) {
    const data = this.getAll(table);
    const index = data.findIndex(item => item.id === id);
    if (index !== -1) {
      data[index] = {
        ...data[index],
        ...updates,
        updated_at: new Date().toISOString()
      };
      this.setTable(table, data);
      return data[index];
    }
    return null;
  }

  /**
   * 항목 삭제
   */
  delete(table, id) {
    const data = this.getAll(table);
    const filtered = data.filter(item => item.id !== id);
    this.setTable(table, filtered);
    return filtered.length < data.length;
  }

  /**
   * 고유 ID 생성
   */
  generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2);
  }

  /**
   * 전체 데이터 내보내기 (백업)
   */
  exportAll() {
    const allData = {};
    Object.keys(localStorage).forEach(key => {
      if (key.startsWith(this.storagePrefix)) {
        const tableName = key.replace(this.storagePrefix, '');
        allData[tableName] = JSON.parse(localStorage.getItem(key));
      }
    });
    return allData;
  }

  /**
   * 데이터 가져오기 (복원)
   */
  importAll(data) {
    Object.keys(data).forEach(table => {
      this.setTable(table, data[table]);
    });
  }

  /**
   * 전체 데이터 초기화
   */
  clearAll() {
    Object.keys(localStorage).forEach(key => {
      if (key.startsWith(this.storagePrefix)) {
        localStorage.removeItem(key);
      }
    });
    this.initializeStorage();
  }

  /**

/**
 * StartupHR Pro - Utility Functions
 * 공통 유틸리티 함수 모음
 */

const Utils = {
  /**
   * 날짜 포맷팅
   */
  formatDate(dateString, format = 'YYYY-MM-DD') {
    if (!dateString) return '';
    const date = new Date(dateString);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');

    const formats = {
      'YYYY-MM-DD': `${year}-${month}-${day}`,
      'YYYY.MM.DD': `${year}.${month}.${day}`,
      'MM/DD': `${month}/${day}`,
      'YYYY-MM-DD HH:mm': `${year}-${month}-${day} ${hours}:${minutes}`,
      'HH:mm': `${hours}:${minutes}`
    };

    return formats[format] || formats['YYYY-MM-DD'];
  },

  /**
   * 상대적 시간 표시 (예: "2시간 전")
   */
  timeAgo(dateString) {
    const now = new Date();
    const past = new Date(dateString);
    const diffMs = now - past;
    const diffSec = Math.floor(diffMs / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffHour = Math.floor(diffMin / 60);
    const diffDay = Math.floor(diffHour / 24);

    if (diffDay > 0) return `${diffDay}일 전`;
    if (diffHour > 0) return `${diffHour}시간 전`;
    if (diffMin > 0) return `${diffMin}분 전`;
    return '방금';
  },

  /**
   * 숫자 포맷팅 (3자리 콤마)
   */
  formatNumber(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  },

  /**
   * 금액 포맷팅
   */
  formatCurrency(amount) {
    return `${this.formatNumber(amount)}원`;
  },

  /**
   * 주간 근무시간 계산
   */
  calculateWeeklyHours(attendance, employeeId, weekStart) {
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 7);

    const weekAttendance = attendance.filter(record => {
      const recordDate = new Date(record.date);
      return record.employee_id === employeeId &&
             recordDate >= weekStart &&
             recordDate < weekEnd;
    });

    return weekAttendance.reduce((total, record) => {
      return total + (record.work_hours || 0);
    }, 0);
  },

  /**
   * 시급 계산
   */
  calculateHourlyWage(monthlySalary, weeklyHours = 40) {
    const monthlyHours = (weeklyHours * 52) / 12;
    return Math.round(monthlySalary / monthlyHours);
  },

  /**
   * 최저시급 체크 (2026년 기준)
   */
  checkMinimumWage(hourlyWage) {
    const MINIMUM_WAGE_2026 = 10030; // 예상 최저시급
    return {
      isValid: hourlyWage >= MINIMUM_WAGE_2026,
      difference: hourlyWage - MINIMUM_WAGE_2026,
      minimumWage: MINIMUM_WAGE_2026
    };
  },

  /**
   * 52시간 체크
   */
  check52Hours(weeklyHours) {
    let status = 'safe';
    let message = '정상';
    let color = 'green';

    if (weeklyHours >= 52) {
      status = 'danger';
      message = '52시간 초과! 즉시 조치 필요';
      color = 'red';
    } else if (weeklyHours >= 50) {
      status = 'critical';
      message = '52시간 임박 경고';
      color = 'orange';
    } else if (weeklyHours >= 40) {
      status = 'warning';
      message = '연장근로 중';
      color = 'yellow';
    }

    return {
      status,
      message,
      color,
      hours: weeklyHours,
      overtime: Math.max(0, weeklyHours - 40),
      violation: Math.max(0, weeklyHours - 52)
    };
  },

  /**
   * 감정적 표현 감지
   */
  detectEmotionalWords(text) {
    const emotionalWords = {
      critical: ['배신', '이기적', '책임감 없다', '정이 없다', '나가라', '그만둬라'],
      warning: ['서운하다', '실망', '화난다', '짜증', '속상하다'],
      inappropriate: ['바보', '멍청', '한심', '쓰레기']
    };

    const detected = {
      critical: [],
      warning: [],
      inappropriate: [],
      hasCritical: false,
      hasWarning: false,
      hasInappropriate: false
    };

    Object.keys(emotionalWords).forEach(level => {
      emotionalWords[level].forEach(word => {
        if (text.includes(word)) {
          detected[level].push(word);
          detected[`has${level.charAt(0).toUpperCase() + level.slice(1)}`] = true;
        }
      });
    });

    return detected;
  },

  /**
   * 법적 리스크 키워드 감지
   */
  detectLegalRisks(text) {
    const riskKeywords = {
      critical: ['24시간 일하자', '52시간 초과', '주말도 당연히', '돈 안 주면'],
      warning: ['환불 안 하면', '노동청 신고', '고소', '소송'],
      important: ['계약', '급여', '환불', '퇴사', '해고', '교육비']
    };

    const risks = {
      critical: [],
      warning: [],
      important: [],
      riskScore: 0
    };

    Object.keys(riskKeywords).forEach(level => {
      riskKeywords[level].forEach(keyword => {
        if (text.includes(keyword)) {
          risks[level].push(keyword);
          risks.riskScore += level === 'critical' ? 30 : (level === 'warning' ? 15 : 5);
        }
      });
    });

    return risks;
  },

  /**
   * D-day 계산
   */
  getDDay(targetDate) {
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const target = new Date(targetDate);
    target.setHours(0, 0, 0, 0);
    const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));

    if (diff === 0) return 'D-Day';
    if (diff > 0) return `D-${diff}`;
    return `D+${Math.abs(diff)}`;
  },

  /**
   * 리스크 레벨 색상
   */
  getRiskColor(score) {
    if (score >= 80) return 'red';
    if (score >= 60) return 'orange';
    if (score >= 40) return 'yellow';
    return 'green';
  },

  /**
   * 요일 구하기
   */
  getDayOfWeek(dateString) {
    const days = ['일', '월', '화', '수', '목', '금', '토'];
    const date = new Date(dateString);
    return days[date.getDay()];
  },

  /**
   * 주차 시작일 구하기 (월요일 기준)
   */
  getWeekStart(date = new Date()) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff));
  },

  /**
   * 난수 생성
   */
  randomId() {
    return Math.random().toString(36).substr(2, 9);
  },

  /**
   * 배열 셔플
   */
  shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  },

  /**
   * Deep Clone
   */
  clone(obj) {
    return JSON.parse(JSON.stringify(obj));
  },

  /**
   * 텍스트 하이라이트
   */
  highlightText(text, keywords) {
    let highlighted = text;
    keywords.forEach(keyword => {
      const regex = new RegExp(keyword, 'gi');
      highlighted = highlighted.replace(regex, `<mark class="bg-yellow-200">$&</mark>`);
    });
    return highlighted;
  },

  /**
   * 파일 다운로드
   */
  downloadFile(content, filename, contentType = 'text/plain') {
    const blob = new Blob([content], { type: contentType });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    link.click();
    URL.revokeObjectURL(url);
  },

  /**
   * JSON 다운로드
   */
  downloadJSON(data, filename) {
    const json = JSON.stringify(data, null, 2);
    this.downloadFile(json, filename, 'application/json');
  },

  /**
   * 성공 알림
   */
  showSuccess(message) {
    this.showNotification(message, 'success');
  },

  /**
   * 에러 알림
   */
  showError(message) {
    this.showNotification(message, 'error');
  },

  /**
   * 프로페셔널 Toast 알림 표시
   */
  showNotification(message, type = 'info') {
    const container = document.getElementById('toast-container') || this.createToastContainer();

    const icons = {
      success: '✅',
      error: '❌',
      warning: '⚠️',
      info: 'ℹ️'
    };

    const colors = {
      success: 'border-green-500',
      error: 'border-red-500',
      warning: 'border-yellow-500',
      info: 'border-blue-500'
    };

    const toast = document.createElement('div');
    toast.className = `toast ${colors[type]} animate-slide-in-right`;
    toast.innerHTML = `
      <div class="text-2xl">${icons[type]}</div>
      <div class="flex-1">
        <div class="font-medium text-gray-900">${message}</div>
      </div>
      <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-gray-600">
        <span class="text-xl">×</span>
      </button>
    `;

    container.appendChild(toast);

    // 자동 제거
    setTimeout(() => {
      if (toast.parentElement) {
        toast.style.animation = 'slide-in-right 0.3s ease-out reverse';
        setTimeout(() => toast.remove(), 300);
      }
    }, 4000);
  },

  createToastContainer() {
    const container = document.createElement('div');
    container.id = 'toast-container';
    container.className = 'toast-container';
    document.body.appendChild(container);
    return container;
  },

  /**
   * 확인 다이얼로그
   */
  confirm(message) {
    return window.confirm(message);
  },

  /**
   * 디바운스
   */
  debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }
};

/**
 * Photo Manager
 * 프로필 사진 관리 시스템
 */
const PhotoManager = {
  /**
   * 사진 업로드
   */
  uploadPhoto(file, id, type = 'employee') {
    return new Promise((resolve, reject) => {
      if (!file) {
        reject('파일이 없습니다.');
        return;
      }

      // 파일 크기 체크 (5MB 제한)
      if (file.size > 5 * 1024 * 1024) {
        reject('파일 크기는 5MB 이하여야 합니다.');
        return;
      }

      // 파일 타입 체크
      if (!file.type.startsWith('image/')) {
        reject('이미지 파일만 업로드 가능합니다.');
        return;
      }

      const reader = new FileReader();

      reader.onload = (e) => {
        const base64 = e.target.result;

        // LocalStorage에 저장
        const key = `photo_${type}_${id}`;
        try {
          localStorage.setItem(key, base64);
          Utils.showSuccess('사진이 업로드되었습니다.');
          resolve(base64);
        } catch (error) {
          if (error.name === 'QuotaExceededError') {
            reject('저장 공간이 부족합니다. 다른 사진을 삭제하거나 더 작은 파일을 사용해주세요.');
          } else {
            reject('사진 저장 중 오류가 발생했습니다.');
          }
        }
      };

      reader.onerror = () => {
        reject('파일 읽기 중 오류가 발생했습니다.');
      };

      reader.readAsDataURL(file);
    });
  },

  /**
   * 사진 가져오기
   */
  getPhoto(id, type = 'employee') {
    const key = `photo_${type}_${id}`;
    return localStorage.getItem(key);
  },

  /**
   * 사진 삭제
   */
  deletePhoto(id, type = 'employee') {
    const key = `photo_${type}_${id}`;
    localStorage.removeItem(key);
    Utils.showSuccess('사진이 삭제되었습니다.');
  },

  /**
   * 프로필 사진 HTML 생성
   */
  renderPhoto(id, name, size = 'default', type = 'employee') {
    const photo = this.getPhoto(id, type);
    const sizeClass = size === 'sm' ? 'profile-photo-sm' : size === 'lg' ? 'profile-photo-lg' : '';

    if (photo) {
      return `<img src="${photo}" alt="${name}" class="profile-photo ${sizeClass}">`;
    } else {
      // 이름의 첫 글자로 플레이스홀더 생성
      const initial = name ? name.charAt(0).toUpperCase() : '?';
      return `<div class="profile-photo profile-photo-placeholder ${sizeClass}">${initial}</div>`;
    }
  },

  /**
   * 사진 업로드 UI 생성
   */
  renderPhotoUpload(id, name, type = 'employee') {
    const photo = this.getPhoto(id, type);
    return `
      <div class="profile-photo-upload">
        <input type="file" accept="image/*" onchange="PhotoManager.handlePhotoUpload(this, '${id}', '${type}')">
        ${this.renderPhoto(id, name, 'lg', type)}
      </div>
    `;
  },

  /**
   * 사진 업로드 핸들러
   */
  handlePhotoUpload(input, id, type) {
    const file = input.files[0];
    if (file) {
      this.uploadPhoto(file, id, type)
        .then(() => {
          // 페이지 다시 렌더링
          if (typeof App !== 'undefined' && App.currentPage) {
            App.renderPage(App.currentPage);
          }
        })
        .catch((error) => {
          Utils.showError(error);
        });
    }
  }
};

/**
 * Notification Center
 * 알림 센터 관리
 */
const NotificationCenter = {
  notifications: [],
  isOpen: false,

  /**
   * 초기화
   */
  init() {
    // LocalStorage에서 알림 로드
    const saved = localStorage.getItem('notifications');
    if (saved) {
      this.notifications = JSON.parse(saved);
    }

    // 알림 센터 UI 생성
    this.render();

    // 이벤트 리스너 등록
    this.setupEventListeners();
  },

  /**
   * 알림 추가
   */
  add(notification) {
    const newNotification = {
      id: Utils.randomId(),
      title: notification.title,
      description: notification.description,
      type: notification.type || 'info', // info, success, warning, danger
      read: false,
      timestamp: new Date().toISOString(),
      ...notification
    };

    this.notifications.unshift(newNotification);
    this.save();
    this.render();

    // Toast 알림도 표시
    if (notification.showToast !== false) {
      Utils.showNotification(notification.title, notification.type);
    }

    return newNotification;
  },

  /**
   * 알림 읽음 처리
   */
  markAsRead(id) {
    const notification = this.notifications.find(n => n.id === id);
    if (notification) {
      notification.read = true;
      this.save();
      this.render();
    }
  },

  /**
   * 모든 알림 읽음 처리
   */
  markAllAsRead() {
    this.notifications.forEach(n => n.read = true);
    this.save();
    this.render();
  },

  /**
   * 알림 삭제
   */
  delete(id) {
    this.notifications = this.notifications.filter(n => n.id !== id);
    this.save();
    this.render();
  },

  /**
   * 모든 알림 삭제
   */
  clearAll() {
    if (Utils.confirm('모든 알림을 삭제하시겠습니까?')) {
      this.notifications = [];
      this.save();
      this.render();
    }
  },

  /**
   * LocalStorage에 저장
   */
  save() {
    localStorage.setItem('notifications', JSON.stringify(this.notifications));
  },

  /**
   * 읽지 않은 알림 개수
   */
  getUnreadCount() {
    return this.notifications.filter(n => !n.read).length;
  },

  /**
   * 알림 센터 토글
   */
  toggle() {
    this.isOpen = !this.isOpen;
    const center = document.getElementById('notification-center');
    if (center) {
      center.classList.toggle('active', this.isOpen);
    }
  },

  /**
   * 알림 센터 렌더링
   */
  render() {
    let container = document.getElementById('notification-center');

    if (!container) {
      container = document.createElement('div');
      container.id = 'notification-center';
      container.className = 'notification-center';
      document.body.appendChild(container);
    }

    const unreadCount = this.getUnreadCount();

    container.innerHTML = `
      <div class="notification-center-header">
        <div>
          <div class="font-semibold text-lg">알림</div>
          <div class="text-sm opacity-90">${unreadCount}개의 읽지 않은 알림</div>
        </div>
        <button onclick="NotificationCenter.toggle()" class="text-white text-2xl hover:opacity-80">×</button>
      </div>
      <div class="notification-center-body">
        ${this.notifications.length === 0 ? `
          <div class="text-center py-8 text-gray-500">
            <div class="text-4xl mb-2">📭</div>
            <div>알림이 없습니다</div>
          </div>
        ` : this.notifications.map(n => `
          <div class="notification-item ${n.read ? '' : 'unread'}"
               onclick="NotificationCenter.markAsRead('${n.id}')">
            <div class="notification-item-title">${n.title}</div>
            <div class="notification-item-description">${n.description}</div>
            <div class="notification-item-time">${Utils.timeAgo(n.timestamp)}</div>
          </div>
        `).join('')}
      </div>
      ${this.notifications.length > 0 ? `
        <div class="p-4 border-t border-gray-200 flex gap-2">
          <button onclick="NotificationCenter.markAllAsRead()"
                  class="flex-1 px-4 py-2 text-sm font-medium text-blue-600 hover:bg-blue-50 rounded-lg transition">
            모두 읽음
          </button>
          <button onclick="NotificationCenter.clearAll()"
                  class="flex-1 px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition">
            모두 삭제
          </button>
        </div>
      ` : ''}
    `;

    // 벨 아이콘 업데이트
    this.updateBellIcon();
  },

  /**
   * 벨 아이콘 업데이트
   */
  updateBellIcon() {
    const bellBtn = document.getElementById('notification-bell');
    if (bellBtn) {
      const unreadCount = this.getUnreadCount();
      const existingBadge = bellBtn.querySelector('.notification-badge');

      if (unreadCount > 0) {
        if (!existingBadge) {
          const badge = document.createElement('span');
          badge.className = 'notification-badge';
          badge.textContent = unreadCount;
          bellBtn.style.position = 'relative';
          bellBtn.appendChild(badge);
        } else {
          existingBadge.textContent = unreadCount;
        }
      } else {
        if (existingBadge) {
          existingBadge.remove();
        }
      }
    }
  },

  /**
   * 이벤트 리스너 설정
   */
  setupEventListeners() {
    // 외부 클릭 시 닫기
    document.addEventListener('click', (e) => {
      const center = document.getElementById('notification-center');
      const bellBtn = document.getElementById('notification-bell');

      if (this.isOpen && center && !center.contains(e.target) && e.target !== bellBtn && !bellBtn?.contains(e.target)) {
        this.toggle();
      }
    });
  },

  /**
   * 자동 알림 생성 (테스트용)
   */
  addTestNotifications() {
    this.add({
      title: '52시간 초과 경고',
      description: '김철수님이 이번 주 52시간을 초과했습니다.',
      type: 'danger'
    });

    this.add({
      title: '계약 만료 예정',
      description: '박영희님의 계약이 7일 후 만료됩니다.',
      type: 'warning'
    });

    this.add({
      title: '신규 직원 등록',
      description: '이민수님이 팀에 합류했습니다.',
      type: 'success'
    });
  }
};

  /**
   * 모든 데이터 내보내기
   */
  exportAllData() {
    const data = {
      settings: this.load(),
      employees: db.getAll('employees'),
      contracts: db.getAll('contracts'),
      attendance: db.getAll('attendance'),
      communications: db.getAll('communications'),
      warnings: db.getAll('warnings'),
      checklist: db.getAll('checklist'),
      exportDate: new Date().toISOString(),
      version: '3.0'
    };

    const filename = `startuphr-backup-${Utils.formatDate(new Date(), 'YYYY-MM-DD')}.json`;
    Utils.downloadJSON(data, filename);

    NotificationCenter.add({
      title: '데이터 내보내기 완료',
      description: `${filename} 파일로 저장되었습니다.`,
      type: 'success'
    });
  },

  /**
   * 데이터 가져오기
   */
  importData(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);

          // 데이터 유효성 검사
          if (!data.version || !data.exportDate) {
            reject('올바른 백업 파일이 아닙니다.');
            return;
          }

          // 확인
          if (!Utils.confirm('기존 데이터를 모두 덮어쓰시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
            reject('사용자가 취소했습니다.');
            return;
          }

          // 데이터 복원
          if (data.settings) {
            this.save(data.settings);
          }

          if (data.employees) {
            localStorage.setItem('employees', JSON.stringify(data.employees));
          }

          if (data.contracts) {
            localStorage.setItem('contracts', JSON.stringify(data.contracts));
          }

          if (data.attendance) {
            localStorage.setItem('attendance', JSON.stringify(data.attendance));
          }

          if (data.communications) {
            localStorage.setItem('communications', JSON.stringify(data.communications));
          }

          if (data.warnings) {
            localStorage.setItem('warnings', JSON.stringify(data.warnings));
          }

          if (data.checklist) {
            localStorage.setItem('checklist', JSON.stringify(data.checklist));
          }

          Utils.showSuccess('데이터를 성공적으로 가져왔습니다. 페이지를 새로고침합니다.');

          NotificationCenter.add({
            title: '데이터 가져오기 완료',
            description: '모든 데이터가 복원되었습니다.',
            type: 'success'
          });

          // 페이지 새로고침
          setTimeout(() => {
            window.location.reload();
          }, 2000);

          resolve(data);
        } catch (error) {
          console.error('데이터 가져오기 실패:', error);
          reject('파일 읽기 중 오류가 발생했습니다.');
        }
      };

      reader.onerror = () => {
        reject('파일 읽기 중 오류가 발생했습니다.');
      };

      reader.readAsText(file);
    });
  },

window.SettingsManager = SettingsManager;

/**
 * StartupHR Pro - Employee Management Module
 * 직원 관리 시스템
 */

const EmployeeManager = {
  /**
   * 모든 직원 조회
   */
  getAll() {
    return db.getAll('employees');
  },

  /**
   * 직원 추가
   */
  add(employeeData) {
    const employee = db.add('employees', {
      name: employeeData.name,
      email: employeeData.email,
      phone: employeeData.phone,
      hire_date: employeeData.hire_date,
      position: employeeData.position,
      status: 'active',
      contract_type: employeeData.contract_type || '정규직'
    });

    Utils.showSuccess(`${employee.name}님이 추가되었습니다.`);
    return employee;
  },

  /**
   * 직원 정보 업데이트
   */
  update(id, updates) {
    const updated = db.update('employees', id, updates);
    if (updated) {
      Utils.showSuccess('직원 정보가 업데이트되었습니다.');
    }
    return updated;
  },

  /**
   * 직원 삭제
   */
  delete(id) {
    if (Utils.confirm('정말 삭제하시겠습니까?')) {
      const success = db.delete('employees', id);
      if (success) {
        Utils.showSuccess('직원이 삭제되었습니다.');
      }
      return success;
    }
    return false;
  },

  /**
   * 직원 상세 정보
   */
  getDetail(id) {
    const employee = db.getById('employees', id);
    if (!employee) return null;

    // 관련 데이터 통합
    const contracts = db.find('contracts', c => c.employee_id === id);
    const attendance = db.find('attendance', a => a.employee_id === id);
    const warnings = db.find('warnings', w => w.employee_id === id);
    const communications = db.find('communications', c => c.employee_id === id);

    // 이번 주 근무시간 계산
    const weekStart = Utils.getWeekStart();
    const weeklyHours = Utils.calculateWeeklyHours(attendance, id, weekStart);
    const hourCheck = Utils.check52Hours(weeklyHours);

    return {
      ...employee,
      contracts,
      attendance,
      warnings,
      communications,
      weeklyHours,
      hourCheck,
      stats: this.calculateStats(id)
    };
  },

  /**
   * 직원 통계 계산
   */
  calculateStats(id) {
    const attendance = db.find('attendance', a => a.employee_id === id);
    const warnings = db.find('warnings', w => w.employee_id === id);

    // 총 근무일수
    const totalDays = attendance.length;

    // 평균 근무시간
    const totalHours = attendance.reduce((sum, a) => sum + (a.work_hours || 0), 0);
    const avgHours = totalDays > 0 ? (totalHours / totalDays).toFixed(1) : 0;

    // 경고 횟수
    const warningCount = warnings.length;

    // 지각 횟수
    const lateCount = attendance.filter(a => {
      if (!a.clock_in) return false;
      const clockIn = new Date(`2000-01-01 ${a.clock_in}`);
      const standard = new Date(`2000-01-01 09:00`);
      return clockIn > standard;
    }).length;

    return {
      totalDays,
      totalHours: totalHours.toFixed(1),
      avgHours,
      warningCount,
      lateCount
    };
  },

  /**
   * 활성 직원만 조회
   */
  getActive() {
    return db.find('employees', e => e.status === 'active');
  },

  /**
   * 퇴사자 조회
   */
  getInactive() {
    return db.find('employees', e => e.status === 'inactive');
  },

  /**
   * 직원 검색
   */
  search(keyword) {
    const lower = keyword.toLowerCase();
    return db.find('employees', e =>
      e.name.toLowerCase().includes(lower) ||
      e.email.toLowerCase().includes(lower) ||
      e.position.toLowerCase().includes(lower)
    );
  },

  /**
   * 리스크 있는 직원 찾기
   */
  getRiskyEmployees() {
    const employees = this.getActive();
    const risky = [];

    employees.forEach(emp => {
      const detail = this.getDetail(emp.id);
      const risks = [];

      // 52시간 초과
      if (detail.hourCheck.status === 'danger') {
        risks.push({
          type: 'critical',
          message: `52시간 초과 (${detail.weeklyHours}시간)`
        });
      }

      // 경고 3회 이상
      if (detail.stats.warningCount >= 3) {
        risks.push({
          type: 'warning',
          message: `경고 ${detail.stats.warningCount}회`
        });
      }

      // 지각 5회 이상
      if (detail.stats.lateCount >= 5) {
        risks.push({
          type: 'warning',
          message: `지각 ${detail.stats.lateCount}회`
        });
      }

      // 소통 회피 패턴 감지
      const recentComms = detail.communications.slice(-10);
      const missedComms = recentComms.filter(c => c.comm_type === '소통회피').length;
      if (missedComms >= 3) {
        risks.push({
          type: 'critical',
          message: '소통 회피 패턴 감지'
        });
      }

      if (risks.length > 0) {
        risky.push({
          employee: emp,
          risks,
          riskScore: risks.filter(r => r.type === 'critical').length * 30 +
                     risks.filter(r => r.type === 'warning').length * 15
        });
      }
    });

    return risky.sort((a, b) => b.riskScore - a.riskScore);
  },

  /**
   * 계약 만료 임박 직원
   */
  getExpiringContracts(days = 30) {
    const employees = this.getActive();
    const expiring = [];

    employees.forEach(emp => {
      const contracts = db.find('contracts', c =>
        c.employee_id === emp.id && c.end_date
      );

      contracts.forEach(contract => {
        const daysUntil = Math.ceil(
          (new Date(contract.end_date) - new Date()) / (1000 * 60 * 60 * 24)
        );

        if (daysUntil > 0 && daysUntil <= days) {
          expiring.push({
            employee: emp,
            contract,
            daysUntil,
            dDay: Utils.getDDay(contract.end_date)
          });
        }
      });
    });

    return expiring.sort((a, b) => a.daysUntil - b.daysUntil);
  },

  /**
   * 퇴사 처리
   */
  terminate(id, reason, exitDate) {
    const employee = db.getById('employees', id);
    if (!employee) return null;

    // 상태 업데이트
    this.update(id, {
      status: 'inactive',
      exit_date: exitDate,
      exit_reason: reason
    });

    // 퇴사 기록 추가
    db.add('communications', {
      employee_id: id,
      comm_type: '퇴사',
      subject: '퇴사 처리',
      content: reason,
      date: exitDate
    });

    Utils.showSuccess(`${employee.name}님의 퇴사가 처리되었습니다.`);
    return true;
  },

  /**
   * 대시보드 요약 데이터
   */
  getDashboardSummary() {
    const all = this.getAll();
    const active = this.getActive();
    const risky = this.getRiskyEmployees();
    const expiring = this.getExpiringContracts();

    // 이번 주 전체 근무시간
    const weekStart = Utils.getWeekStart();
    const attendance = db.getAll('attendance');

    const weeklyStats = active.map(emp => {
      const hours = Utils.calculateWeeklyHours(attendance, emp.id, weekStart);
      return {
        employee: emp,
        hours,
        check: Utils.check52Hours(hours)
      };
    });

    return {
      total: all.length,
      active: active.length,
      inactive: all.length - active.length,
      risky: risky.length,
      expiring: expiring.length,
      weeklyStats,
      riskyEmployees: risky,
      expiringContracts: expiring
    };
  },

  // ===== 고급 기능 =====

  /**
   * 고급 검색 및 필터링
   */
  advancedSearch(filters) {
    let employees = this.getAll();

    // 키워드 검색
    if (filters.keyword) {
      const lower = filters.keyword.toLowerCase();
      employees = employees.filter(e =>
        e.name.toLowerCase().includes(lower) ||
        e.email.toLowerCase().includes(lower) ||
        e.position.toLowerCase().includes(lower) ||
        e.phone.toLowerCase().includes(lower)
      );
    }

    // 상태 필터
    if (filters.status && filters.status !== 'all') {
      employees = employees.filter(e => e.status === filters.status);
    }

    // 계약 타입 필터
    if (filters.contractType && filters.contractType !== 'all') {
      employees = employees.filter(e => e.contract_type === filters.contractType);
    }

    // 직책 필터
    if (filters.position && filters.position !== 'all') {
      employees = employees.filter(e => e.position === filters.position);
    }

    // 입사일 범위
    if (filters.hireDateFrom) {
      employees = employees.filter(e =>
        new Date(e.hire_date) >= new Date(filters.hireDateFrom)
      );
    }

    if (filters.hireDateTo) {
      employees = employees.filter(e =>
        new Date(e.hire_date) <= new Date(filters.hireDateTo)
      );
    }

    // 리스크 필터
    if (filters.riskLevel && filters.riskLevel !== 'all') {
      const riskyEmployees = this.getRiskyEmployees();
      const riskyIds = riskyEmployees
        .filter(r => {
          if (filters.riskLevel === 'high') return r.riskScore >= 60;
          if (filters.riskLevel === 'medium') return r.riskScore >= 30 && r.riskScore < 60;
          if (filters.riskLevel === 'low') return r.riskScore < 30;
          return true;
        })
        .map(r => r.employee.id);

      employees = employees.filter(e => riskyIds.includes(e.id));
    }

    // 정렬
    if (filters.sortBy) {
      employees = this.sortEmployees(employees, filters.sortBy, filters.sortOrder || 'asc');
    }

    return employees;
  },

  /**
   * 직원 정렬
   */
  sortEmployees(employees, sortBy, order = 'asc') {
    const sorted = [...employees].sort((a, b) => {
      let aVal, bVal;

      switch (sortBy) {
        case 'name':
          aVal = a.name;
          bVal = b.name;
          break;
        case 'hire_date':
          aVal = new Date(a.hire_date);
          bVal = new Date(b.hire_date);
          break;
        case 'position':
          aVal = a.position;
          bVal = b.position;
          break;
        case 'status':
          aVal = a.status;
          bVal = b.status;
          break;
        default:
          return 0;
      }

      if (aVal < bVal) return order === 'asc' ? -1 : 1;
      if (aVal > bVal) return order === 'asc' ? 1 : -1;
      return 0;
    });

    return sorted;
  },

  /**
   * 고유 값 추출 (필터용)
   */
  getUniqueValues(field) {
    const employees = this.getAll();
    const values = new Set(employees.map(e => e[field]).filter(Boolean));
    return Array.from(values).sort();

  /**
   * CSV 내보내기
   */
  exportToCSV(employees = null) {
    const data = employees || this.getAll();

    if (data.length === 0) {
      Utils.showError('내보낼 데이터가 없습니다.');
      return;
    }

    // CSV 헤더
    const headers = ['이름', '이메일', '전화번호', '직책', '입사일', '계약타입', '상태'];
    const rows = data.map(e => [
      e.name,
      e.email,
      e.phone,
      e.position,
      e.hire_date,
      e.contract_type,
      e.status
    ]);

    // CSV 생성
    const csv = [
      headers.join(','),
      ...rows.map(row => row.join(','))
    ].join('\n');

    // UTF-8 BOM 추가 (한글 깨짐 방지)
    const BOM = '\uFEFF';
    const filename = `employees-${Utils.formatDate(new Date(), 'YYYY-MM-DD')}.csv`;

    Utils.downloadFile(BOM + csv, filename, 'text/csv;charset=utf-8;');

    NotificationCenter.add({
      title: '직원 데이터 내보내기 완료',
      description: `${data.length}명의 직원 정보가 ${filename}로 저장되었습니다.`,
      type: 'success'
    });
  },

  /**
   * CSV 가져오기
   */
  importFromCSV(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = (e) => {
        try {
          const text = e.target.result;
          const lines = text.split('\n').filter(line => line.trim());

          if (lines.length < 2) {
            reject('CSV 파일이 비어있습니다.');
            return;
          }

          // 헤더 제거
          const dataLines = lines.slice(1);
          let successCount = 0;

          dataLines.forEach(line => {
            const values = line.split(',').map(v => v.trim());

            if (values.length >= 6) {
              const employeeData = {
                name: values[0],
                email: values[1],
                phone: values[2],
                position: values[3],
                hire_date: values[4],
                contract_type: values[5]
              };

              try {
                this.add(employeeData);
                successCount++;
              } catch (error) {
                console.error('직원 추가 실패:', employeeData, error);
              }
            }
          });

          Utils.showSuccess(`${successCount}명의 직원이 추가되었습니다.`);
          resolve(successCount);
        } catch (error) {
          console.error('CSV 파싱 실패:', error);
          reject('CSV 파일 읽기 중 오류가 발생했습니다.');
        }
      };

      reader.onerror = () => {
        reject('파일 읽기 중 오류가 발생했습니다.');
      };

      reader.readAsText(file);
    });
  },

const ContractManager = {
  /**
   * 계약서 생성
   */
  create(contractData) {
    // 법적 리스크 자동 체크
    const risks = this.checkRisks(contractData);

    if (risks.critical.length > 0) {
      const proceed = Utils.confirm(
        `⚠️ 심각한 법적 리스크가 발견되었습니다:\n${risks.critical.join('\n')}\n\n계속하시겠습니까?`
      );
      if (!proceed) return null;
    }

    const contract = db.add('contracts', {
      employee_id: contractData.employee_id,
      contract_type: contractData.contract_type,
      start_date: contractData.start_date,
      end_date: contractData.end_date || null,
      weekly_hours: parseInt(contractData.weekly_hours),
      salary: parseInt(contractData.salary),
      special_terms: contractData.special_terms || {},
      status: 'draft',
      risks: risks
    });

    Utils.showSuccess('계약서가 생성되었습니다.');
    return contract;
  },

  /**
   * 법적 리스크 체크
   */
  checkRisks(data) {
    const risks = {
      critical: [],
      warning: [],
      info: []
    };

    // 1. 52시간 체크
    if (data.weekly_hours > 52) {
      risks.critical.push('❌ 주 52시간 초과 계약 (근로기준법 위반)');
    } else if (data.weekly_hours > 40) {
      risks.warning.push('⚠️ 연장근로 포함 계약 (합의 필요)');
    }

    // 2. 최저시급 체크
    const hourlyWage = Utils.calculateHourlyWage(data.salary, data.weekly_hours);
    const wageCheck = Utils.checkMinimumWage(hourlyWage);

    if (!wageCheck.isValid) {
      risks.critical.push(
        `❌ 최저시급 미달 (시급: ${Utils.formatCurrency(hourlyWage)}, 최저: ${Utils.formatCurrency(wageCheck.minimumWage)})`
      );
    }

    // 3. 주말 근무 체크
    if (data.special_terms.weekend_required && !data.special_terms.weekend_agreed) {
      risks.critical.push('❌ 주말 근무 의무화 (직원 동의 필요)');
    }

    // 4. 교육비 반환 조항 체크
    if (data.special_terms.education_support && !data.special_terms.refund_policy) {
      risks.warning.push('⚠️ 교육비 반환 조항 누락 (명확히 명시 필요)');
    }

    // 5. 해지 조건 체크
    if (!data.special_terms.termination_notice) {
      risks.info.push('ℹ️ 해지 통보 기간 미명시 (30일 권장)');
    }

    return risks;
  },

  generateTemplate(contractId) {
    const contract = db.getById('contracts', contractId);
    if (!contract) return null;

    const employee = db.getById('employees', contract.employee_id);
